name: CI - amazia-market

on:
  push:
    paths:
      - 'amazia-market/**'
  pull_request:
    paths:
      - 'amazia-market/**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: amazia-market
        run: npm install

      - name: Run tests
        working-directory: amazia-market
        run: npm test

      - name: Build
        working-directory: amazia-market
        run: npm run build
