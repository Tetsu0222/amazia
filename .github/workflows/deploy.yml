name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  test-core:
    name: amazia-core テスト
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Run tests
        working-directory: amazia-core
        run: mvn clean test

  test-console:
    name: amazia-console テスト
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo, sqlite3
      - name: Install dependencies
        working-directory: amazia-console
        run: composer install --no-interaction --prefer-dist
      - name: Copy .env
        working-directory: amazia-console
        run: cp .env.example .env
      - name: Generate app key
        working-directory: amazia-console
        run: php artisan key:generate
      - name: Run tests
        working-directory: amazia-console
        run: php artisan test

  test-market:
    name: amazia-market ビルド確認
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        working-directory: amazia-market
        run: npm install
      - name: Build
        working-directory: amazia-market
        run: npm run build

  deploy:
    name: EC2へデプロイ
    runs-on: ubuntu-latest
    needs: [test-core, test-console, test-market]
    steps:
      - uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: amazia-market ビルド
        working-directory: amazia-market
        run: npm install && npm run build

      - name: amazia-console Vue ビルド
        working-directory: amazia-console/resources/vue
        run: npm install && npm run build

      - name: AWSクレデンシャル設定
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2

      - name: S3にzipをアップロード
        run: |
          zip -r amazia.zip . \
            -x "*.git*" \
            -x "amazia-core/target/*" \
            -x "amazia-console/vendor/*" \
            -x "amazia-console/resources/vue/node_modules/*" \
            -x "amazia-market/node_modules/*"
          aws s3 cp amazia.zip s3://fullstack-renaissance-demo/amazia.zip

      - name: EC2 - アプリ展開とDocker起動
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids i-024a0748df78fc93e \
            --document-name "AWS-RunShellScript" \
            --parameters commands='[
              "aws s3 cp s3://fullstack-renaissance-demo/amazia.zip /home/ssm-user/amazia.zip",
              "cd /home/ssm-user && unzip -o amazia.zip -d amazia",
              "cd /home/ssm-user/amazia && docker-compose down || true",
              "cd /home/ssm-user/amazia && APP_KEY=\"${{ secrets.LARAVEL_APP_KEY }}\" docker-compose up -d"
            ]' \
            --region ap-southeast-2 \
            --query "Command.CommandId" --output text)
          echo "CommandId: $COMMAND_ID"
          for i in $(seq 1 24); do
            sleep 15
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id i-024a0748df78fc93e \
              --region ap-southeast-2 \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "[$i] Status: $STATUS"
            if [ "$STATUS" = "Success" ]; then break; fi
            if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "TimedOut" ]; then
              aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id i-024a0748df78fc93e --region ap-southeast-2 --query "StandardErrorContent" --output text
              exit 1
            fi
          done

      - name: EC2 - Nginx設定とフロントエンド配置
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids i-024a0748df78fc93e \
            --document-name "AWS-RunShellScript" \
            --parameters commands='[
              "sudo cp /home/ssm-user/amazia/nginx/amazia.conf /etc/nginx/conf.d/amazia.conf && sudo rm -f /etc/nginx/conf.d/default.conf",
              "sudo cp -r /home/ssm-user/amazia/amazia-market/dist/. /var/www/amazia-market/",
              "sudo cp -r /home/ssm-user/amazia/amazia-console/resources/vue/dist/. /var/www/amazia-console/",
              "sudo chown -R nginx:nginx /var/www/amazia-market /var/www/amazia-console",
              "sudo nginx -t && sudo systemctl reload nginx"
            ]' \
            --region ap-southeast-2 \
            --query "Command.CommandId" --output text)
          echo "CommandId: $COMMAND_ID"
          for i in $(seq 1 12); do
            sleep 10
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id i-024a0748df78fc93e \
              --region ap-southeast-2 \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "[$i] Status: $STATUS"
            if [ "$STATUS" = "Success" ]; then break; fi
            if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "TimedOut" ]; then
              aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id i-024a0748df78fc93e --region ap-southeast-2 --query "StandardErrorContent" --output text
              exit 1
            fi
          done
