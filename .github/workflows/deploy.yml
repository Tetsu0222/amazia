name: Deploy to EC2

on:
  push:
    branches:
      - main
    paths:
      - 'amazia-core/**'
      - 'amazia-console/**'
      - 'amazia-market/**'
      - 'docker-compose.yml'
      - 'nginx/**'
  workflow_dispatch:

jobs:
  test-core:
    name: amazia-core テスト
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Run tests
        working-directory: amazia-core
        run: mvn clean test

  test-market:
    name: amazia-market テスト
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        working-directory: amazia-market
        run: npm install
      - name: Run tests
        working-directory: amazia-market
        run: npm test

  test-console:
    name: amazia-console テスト
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo, sqlite3, gd, zip
      - name: Install dependencies
        working-directory: amazia-console
        run: composer install --no-interaction --prefer-dist
      - name: Copy .env
        working-directory: amazia-console
        run: cp .env.example .env
      - name: Generate app key
        working-directory: amazia-console
        run: php artisan key:generate
      - name: Run tests
        working-directory: amazia-console
        run: php artisan test

  deploy:
    name: EC2へデプロイ
    runs-on: ubuntu-latest
    needs: [test-core, test-console, test-market]
    steps:
      - uses: actions/checkout@v4

      - name: AWSクレデンシャル設定
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2

      - name: SSMキュー健全性確認・自動リカバリ
        run: |
          INSTANCE_ID="${{ secrets.EC2_INSTANCE_ID }}"
          REGION="ap-southeast-2"

          # SSM Agent にカナリアコマンドを送って実配信できるか確認する
          # PingStatus=Online でも MGS セッションが死んでいると Undeliverable になる
          # 「ゾンビOnline」状態を検知するための関数。
          # 戻り値: 0=配信成功, 1=配信失敗 (Undeliverable / TimedOut / Pending滞留)
          canary_check() {
            local LABEL="$1"
            echo "===== カナリアコマンド送信 ($LABEL) ====="
            local CID
            CID=$(aws ssm send-command \
              --instance-ids "$INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --parameters commands='["echo canary-ok"]' \
              --region "$REGION" \
              --query "Command.CommandId" --output text)
            echo "Canary CommandId: $CID"
            for i in $(seq 1 12); do
              sleep 10
              local ST
              ST=$(aws ssm get-command-invocation \
                --command-id "$CID" \
                --instance-id "$INSTANCE_ID" \
                --region "$REGION" \
                --query "Status" --output text 2>/dev/null || echo "Pending")
              echo "[canary $i] $ST"
              if [ "$ST" = "Success" ]; then
                return 0
              fi
              if [ "$ST" = "Failed" ] || [ "$ST" = "TimedOut" ] || [ "$ST" = "Cancelled" ]; then
                # 024 系の知見：StatusDetails だけだと「Failed」しか分からない。
                # echo canary-ok が exit 1 で落ちる原因（ディスクフル等）を掴むには
                # stdout/stderr の3点セットが必要。042 で実証済み。
                echo "===== カナリア失敗 ($LABEL) StatusDetails ====="
                aws ssm get-command-invocation \
                  --command-id "$CID" \
                  --instance-id "$INSTANCE_ID" \
                  --region "$REGION" \
                  --query "StatusDetails" --output text 2>/dev/null || echo "(取得失敗)"
                echo "===== カナリア失敗 ($LABEL) StandardOutputContent ====="
                aws ssm get-command-invocation \
                  --command-id "$CID" \
                  --instance-id "$INSTANCE_ID" \
                  --region "$REGION" \
                  --query "StandardOutputContent" --output text 2>/dev/null || echo "(取得失敗)"
                echo "===== カナリア失敗 ($LABEL) StandardErrorContent ====="
                aws ssm get-command-invocation \
                  --command-id "$CID" \
                  --instance-id "$INSTANCE_ID" \
                  --region "$REGION" \
                  --query "StandardErrorContent" --output text 2>/dev/null || echo "(取得失敗)"
                return 1
              fi
            done
            echo "カナリアタイムアウト（120秒 Pending 滞留）→ 配信不能と判定"
            aws ssm cancel-command --command-id "$CID" --region "$REGION" 2>/dev/null || true
            return 1
          }

          # EC2 stop/start + Online 連続検知 + 60秒安定化待機
          recover_ssm() {
            echo "EC2を再起動してSSMをリカバリします..."
            aws ec2 stop-instances --instance-ids "$INSTANCE_ID" --region "$REGION"
            aws ec2 wait instance-stopped --instance-ids "$INSTANCE_ID" --region "$REGION"
            aws ec2 start-instances --instance-ids "$INSTANCE_ID" --region "$REGION"

            # PingStatus=Online は SSM Agent のハートビート成立のみを示し
            # コマンド受信パイプラインの起動完了とは別。連続3回 Online + 60秒待機。
            local STREAK=0 OK=false
            for i in $(seq 1 30); do
              sleep 10
              local STATUS
              STATUS=$(aws ssm describe-instance-information \
                --region "$REGION" \
                --query "InstanceInformationList[?InstanceId=='$INSTANCE_ID'].PingStatus" \
                --output text)
              echo "[$i] SSM: ${STATUS:-(empty)} (streak=$STREAK)"
              if [ "$STATUS" = "Online" ]; then
                STREAK=$((STREAK + 1))
                if [ "$STREAK" -ge 3 ]; then
                  OK=true
                  break
                fi
              else
                STREAK=0
              fi
            done
            if [ "$OK" = "false" ]; then
              echo "ERROR: SSM Online連続検知タイムアウト（300秒）"
              return 1
            fi
            echo "SSM Online連続確認。コマンドパイプライン安定化のため60秒待機..."
            sleep 60
            echo "SSM 安定化待機完了。"
          }

          # ----- 第1段階: キュー詰まり / PingStatus 確認 -----
          # 15分以上前からInProgressのコマンドを詰まりと判定
          # JMESPathは&&未対応のため、jqで2段階フィルタ
          THRESHOLD=$(date -u -d '15 minutes ago' +%Y-%m-%dT%H:%M:%S 2>/dev/null \
            || date -u -v-15M +%Y-%m-%dT%H:%M:%S)

          STUCK=$(aws ssm list-commands \
            --instance-id "$INSTANCE_ID" \
            --region "$REGION" \
            --query "Commands[?Status=='InProgress']" \
            --output json \
            | jq --arg threshold "$THRESHOLD" \
              '[.[] | select(.RequestedDateTime < $threshold)] | length')
          echo "15分超InProgressコマンド数: $STUCK"

          PING=$(aws ssm describe-instance-information \
            --region "$REGION" \
            --query "InstanceInformationList[?InstanceId=='$INSTANCE_ID'].PingStatus" \
            --output text)
          echo "SSM PingStatus: ${PING:-NotRegistered}"

          NEEDS_RECOVERY=false
          if [ "$STUCK" -gt 0 ]; then
            echo "判定: SSMキュー詰まり"
            NEEDS_RECOVERY=true
          fi
          if [ "$PING" != "Online" ]; then
            echo "判定: SSM未接続 (PingStatus=${PING:-NotRegistered})"
            NEEDS_RECOVERY=true
          fi

          if [ "$NEEDS_RECOVERY" = "true" ]; then
            recover_ssm || exit 1
          else
            echo "SSMキュー・PingStatusは正常。"
          fi

          # ----- 第2段階: カナリアで実配信を確認（ゾンビOnline検知） -----
          if ! canary_check "1回目"; then
            echo "PingStatus=Online でもカナリア配信失敗 → ゾンビOnlineと判定しリカバリ実行"
            recover_ssm || exit 1
            if ! canary_check "リカバリ後"; then
              echo "ERROR: リカバリ後もカナリア配信失敗。手動調査が必要。"
              exit 1
            fi
          fi
          echo "SSM 配信確認OK。デプロイを開始します。"

      - name: ECRログイン
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: amazia-core イメージビルド・ECR push
        run: |
          docker build -t amazia-core ./amazia-core
          docker tag amazia-core:latest 741011674945.dkr.ecr.ap-southeast-2.amazonaws.com/amazia-core:latest
          docker push 741011674945.dkr.ecr.ap-southeast-2.amazonaws.com/amazia-core:latest

      - name: amazia-console イメージビルド・ECR push
        run: |
          docker build -t amazia-console ./amazia-console
          docker tag amazia-console:latest 741011674945.dkr.ecr.ap-southeast-2.amazonaws.com/amazia-console:latest
          docker push 741011674945.dkr.ecr.ap-southeast-2.amazonaws.com/amazia-console:latest

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: amazia-market ビルド
        working-directory: amazia-market
        run: npm install && npm run build

      - name: amazia-console Vue ビルド
        # フェーズX-3: HTTPS（CloudFront）化時は VITE_BASE_PATH=/console/ をセットして
        # Vue/Vite を /console/ 配下で動かす。Variables/Secrets の HTTPS_ENABLED=true で切替。
        working-directory: amazia-console/resources/vue
        env:
          VITE_BASE_PATH: ${{ vars.HTTPS_ENABLED == 'true' && '/console/' || '/' }}
        run: npm install && npm run build

      - name: S3にzipをアップロード
        run: |
          ls amazia-console/public/vue/ || echo "WARNING: vue dist not found"
          ls amazia-market/dist/ || echo "WARNING: market dist not found"
          zip -r amazia.zip . \
            -x "*.git*" \
            -x "amazia-core/target/*" \
            -x "amazia-console/vendor/*" \
            -x "amazia-console/resources/vue/node_modules/*" \
            -x "amazia-market/node_modules/*"
          aws s3 cp amazia.zip s3://fullstack-renaissance-demo/amazia.zip

      - name: EC2 - Docker停止・ECR pull・Docker起動
        # フェーズX-3: HTTPS（CloudFront）化時は HTTPS_ENABLED=true を GitHub Variables にセット。
        # 環境変数で CORS / Cookie Secure / Cookie Domain / Cookie Path / Password Reset URL を切替。
        env:
          HTTPS_ENABLED: ${{ vars.HTTPS_ENABLED }}
          DEPLOY_DOMAIN: ${{ vars.DEPLOY_DOMAIN || 'www.amazia-portfolio.dedyn.io' }}
        run: |
          if [ "$HTTPS_ENABLED" = "true" ]; then
            CORS_ORIGINS="https://${DEPLOY_DOMAIN}"
            PASSWORD_RESET_URL="https://${DEPLOY_DOMAIN}/console/password/reset/confirm"
            REFRESH_COOKIE_SECURE="true"
            REFRESH_COOKIE_DOMAIN="${DEPLOY_DOMAIN}"
            REFRESH_COOKIE_PATH="/console/api/auth/refresh"
            SESSION_SECURE_COOKIE="true"
            SESSION_DOMAIN="${DEPLOY_DOMAIN}"
          else
            CORS_ORIGINS="http://13.54.203.95,http://13.54.203.95:5173"
            PASSWORD_RESET_URL="http://13.54.203.95:8001/password/reset/confirm"
            REFRESH_COOKIE_SECURE="false"
            REFRESH_COOKIE_DOMAIN=""
            REFRESH_COOKIE_PATH="/api/auth/refresh"
            SESSION_SECURE_COOKIE="false"
            SESSION_DOMAIN=""
          fi
          # SSM の commands 配列は JSON 文字列（ダブルクォート区切り）。
          # シェル変数を埋め込むため jq で安全にエスケープした上で JSON を組み立てる。
          # APP_KEY 等の値内のシングルクォートを避けるため、シェル側ではダブルクォートで囲み、
          # 内部で値内のダブルクォートを使わない構成にする（CORS_ORIGINS にカンマは含まれるが " は含まれない）。
          UP_CMD="cd /home/ssm-user/amazia && APP_KEY='${{ secrets.LARAVEL_APP_KEY }}' CORS_ALLOWED_ORIGINS='${CORS_ORIGINS}' PASSWORD_RESET_URL='${PASSWORD_RESET_URL}' REFRESH_COOKIE_SECURE='${REFRESH_COOKIE_SECURE}' REFRESH_COOKIE_DOMAIN='${REFRESH_COOKIE_DOMAIN}' REFRESH_COOKIE_PATH='${REFRESH_COOKIE_PATH}' SESSION_SECURE_COOKIE='${SESSION_SECURE_COOKIE}' SESSION_DOMAIN='${SESSION_DOMAIN}' docker-compose up -d --remove-orphans"
          # docker image prune -af は ACTIVE（=稼働コンテナが参照中）のイメージを除外して
          # dangling / 未参照イメージのみを削除する。up -d 直後に実行することで、
          # 古い <none> タグや前バージョンの amazia-core/console イメージが /var/lib/docker に
          # 蓄積してディスクフルになるのを防ぐ（トラブル042 対策）。
          PARAMS_JSON=$(jq -n --arg up "$UP_CMD" '{
            commands: [
              "cd /home/ssm-user/amazia && docker-compose down --remove-orphans || true",
              "aws ecr get-login-password --region ap-southeast-2 | docker login --username AWS --password-stdin 741011674945.dkr.ecr.ap-southeast-2.amazonaws.com",
              "docker pull 741011674945.dkr.ecr.ap-southeast-2.amazonaws.com/amazia-core:latest",
              "docker pull 741011674945.dkr.ecr.ap-southeast-2.amazonaws.com/amazia-console:latest",
              "aws s3 cp s3://fullstack-renaissance-demo/amazia.zip /home/ssm-user/amazia.zip",
              "cd /home/ssm-user && unzip -o amazia.zip -d amazia -x \"amazia/amazia-core/storage/*\"",
              "mkdir -p /home/ssm-user/amazia-storage && sudo chown -R 1000:1000 /home/ssm-user/amazia-storage",
              "rm -rf /home/ssm-user/amazia/amazia-core/storage 2>/dev/null; ln -sfn /home/ssm-user/amazia-storage /home/ssm-user/amazia/amazia-core/storage",
              $up,
              "docker image prune -af && df -h /"
            ]
          }')
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --parameters "$PARAMS_JSON" \
            --region ap-southeast-2 \
            --query "Command.CommandId" --output text)
          echo "CommandId: $COMMAND_ID"
          for i in $(seq 1 24); do
            sleep 15
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
              --region ap-southeast-2 \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "[$i] Status: $STATUS"
            if [ "$STATUS" = "Success" ]; then break; fi
            if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "TimedOut" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "===== StatusDetails ====="
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
                --region ap-southeast-2 \
                --query "StatusDetails" --output text
              echo "===== StandardOutputContent ====="
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
                --region ap-southeast-2 \
                --query "StandardOutputContent" --output text
              echo "===== StandardErrorContent ====="
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
                --region ap-southeast-2 \
                --query "StandardErrorContent" --output text
              exit 1
            fi
          done

      - name: EC2 - Nginx設定とフロントエンド配置
        # フェーズX-3: HTTPS_ENABLED=true なら CloudFront 経由用設定（amazia.cloudfront.conf）を配置。
        # それ以外は従来の amazia.conf を配置（直 IP HTTP 動作維持）。
        env:
          HTTPS_ENABLED: ${{ vars.HTTPS_ENABLED }}
        run: |
          if [ "$HTTPS_ENABLED" = "true" ]; then
            NGINX_SRC="amazia.cloudfront.conf"
          else
            NGINX_SRC="amazia.conf"
          fi
          NGINX_CMD="sudo cp /home/ssm-user/amazia/nginx/${NGINX_SRC} /etc/nginx/conf.d/amazia.conf && sudo rm -f /etc/nginx/conf.d/default.conf"
          PARAMS_JSON=$(jq -n --arg ng "$NGINX_CMD" '{
            commands: [
              $ng,
              "sudo cp -r /home/ssm-user/amazia/amazia-market/dist/. /var/www/amazia-market/",
              "sudo cp -r /home/ssm-user/amazia/amazia-console/public/vue/. /var/www/amazia-console/",
              "sudo chown -R nginx:nginx /var/www/amazia-market /var/www/amazia-console",
              "sudo nginx -t && sudo systemctl reload nginx"
            ]
          }')
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --parameters "$PARAMS_JSON" \
            --region ap-southeast-2 \
            --query "Command.CommandId" --output text)
          echo "CommandId: $COMMAND_ID"
          for i in $(seq 1 12); do
            sleep 10
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
              --region ap-southeast-2 \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "[$i] Status: $STATUS"
            if [ "$STATUS" = "Success" ]; then break; fi
            if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "TimedOut" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "===== StatusDetails ====="
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
                --region ap-southeast-2 \
                --query "StatusDetails" --output text
              echo "===== StandardOutputContent ====="
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
                --region ap-southeast-2 \
                --query "StandardOutputContent" --output text
              echo "===== StandardErrorContent ====="
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
                --region ap-southeast-2 \
                --query "StandardErrorContent" --output text
              exit 1
            fi
          done

      - name: デプロイ後ヘルスチェック
        # フェーズX-3: HTTPS_ENABLED=true の場合は CloudFront 経由 URL で確認。
        # 直 IP HTTP の場合は従来どおり nginx (:80) / console (:8000) / core (:8080) を直叩き。
        env:
          HTTPS_ENABLED: ${{ vars.HTTPS_ENABLED }}
          DEPLOY_DOMAIN: ${{ vars.DEPLOY_DOMAIN || 'www.amazia-portfolio.dedyn.io' }}
        run: |
          if [ "$HTTPS_ENABLED" = "true" ]; then
            MARKET_URL="https://${DEPLOY_DOMAIN}/"
            CONSOLE_URL="https://${DEPLOY_DOMAIN}/console/"
            CORE_URL="https://${DEPLOY_DOMAIN}/api/products"
          else
            MARKET_URL="http://13.54.203.95"
            CONSOLE_URL="http://13.54.203.95:8000"
            CORE_URL="http://13.54.203.95:8080/api/products"
          fi
          echo "サービス応答確認中... (MARKET=$MARKET_URL CONSOLE=$CONSOLE_URL CORE=$CORE_URL)"
          for i in $(seq 1 36); do
            sleep 10
            MARKET=$(curl -s -o /dev/null -w "%{http_code}" "$MARKET_URL" 2>/dev/null || echo "000")
            CONSOLE=$(curl -s -o /dev/null -w "%{http_code}" "$CONSOLE_URL" 2>/dev/null || echo "000")
            CORE=$(curl -s -o /dev/null -w "%{http_code}" "$CORE_URL" 2>/dev/null || echo "000")
            echo "[$i] market:$MARKET console:$CONSOLE core:$CORE"
            if [ "$MARKET" = "200" ] && [ "$CONSOLE" = "200" ] && [ "$CORE" = "200" ]; then
              echo "全サービス正常応答を確認"
              exit 0
            fi
          done
          echo "ERROR: ヘルスチェックタイムアウト"
          exit 1

      # ============================================================================
      # フェーズX-6: デプロイ後 主要テーブル存在確認 + 起動 WARN 抽出 + スキーマスナップショット
      #   設計書: docs/design/phaseX/phaseX-6_post_deploy_schema_healthcheck.md
      #   027 / 037 / 038 / 044 と同型の H2 / 本番 MySQL スキーマ乖離をデプロイ後 1 分以内に検知する。
      #   schema.sql の DDL 失敗が `continue-on-error` で WARN 化され、Core 起動・HTTP 200 は通る一方で
      #   該当テーブルだけ未作成のサイレント故障が発生していた構造的盲点への対策。
      # ============================================================================

      - name: ヘルスチェック - 主要テーブル存在確認
        # 改善① ops/healthcheck/required_tables.txt にある全テーブルが
        # 本番 MySQL に存在することを information_schema 経由で確認する。
        # 不足があれば exit 1 で CD を明示失敗させる（::warning:: ではなく ::error::）。
        if: success()
        run: |
          set -euo pipefail

          # 主要テーブル一覧の読み込み（コメント・空行は除外）
          REQUIRED_FILE="ops/healthcheck/required_tables.txt"
          if [ ! -f "$REQUIRED_FILE" ]; then
            echo "::error::主要テーブル一覧ファイルが存在しない: $REQUIRED_FILE"
            exit 1
          fi
          TABLES=$(grep -vE '^[[:space:]]*(#|$)' "$REQUIRED_FILE" | tr -d '[:space:]' | tr '\n' ',' | sed 's/,$//')
          if [ -z "$TABLES" ]; then
            echo "::error::主要テーブル一覧が空（required_tables.txt のコメント・空行を除いて 0 件）"
            exit 1
          fi
          EXPECTED_COUNT=$(echo "$TABLES" | tr ',' '\n' | wc -l)

          # SQL 用に IN 句を組み立て（'a','b','c' 形式）
          IN_LIST=$(echo "$TABLES" | sed "s/,/','/g")
          IN_LIST="'${IN_LIST}'"

          SQL="SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='amazia' AND table_name IN (${IN_LIST});"

          # SSM 経由で MySQL コンテナに接続。MYSQL_ROOT_PASSWORD は EC2 上の .env で解決される。
          PARAMS_JSON=$(jq -n --arg sql "$SQL" '{
            commands: [
              ("docker exec amazia-mysql sh -c \"mysql -uroot -p$MYSQL_ROOT_PASSWORD amazia -N -e \\\"" + $sql + "\\\"\"")
            ]
          }')
          CID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --region ap-southeast-2 \
            --document-name "AWS-RunShellScript" \
            --parameters "$PARAMS_JSON" \
            --query 'Command.CommandId' --output text)

          # コマンド完了待ち（最大 60 秒）
          ST=Pending
          for i in $(seq 1 12); do
            sleep 5
            ST=$(aws ssm get-command-invocation \
              --command-id "$CID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --region ap-southeast-2 \
              --query 'Status' --output text 2>/dev/null || echo "Pending")
            [ "$ST" = "Success" ] && break
            if [ "$ST" = "Failed" ] || [ "$ST" = "TimedOut" ] || [ "$ST" = "Cancelled" ]; then
              break
            fi
          done

          if [ "$ST" != "Success" ]; then
            # 024 / 042 起因：Failed 時は StatusDetails / stdout / stderr の3点セットを出力する
            echo "===== 主要テーブル存在確認 SQL: StatusDetails ====="
            aws ssm get-command-invocation --command-id "$CID" --instance-id "${{ secrets.EC2_INSTANCE_ID }}" --region ap-southeast-2 --query 'StatusDetails' --output text || echo "(取得失敗)"
            echo "===== StandardOutputContent ====="
            aws ssm get-command-invocation --command-id "$CID" --instance-id "${{ secrets.EC2_INSTANCE_ID }}" --region ap-southeast-2 --query 'StandardOutputContent' --output text || echo "(取得失敗)"
            echo "===== StandardErrorContent ====="
            aws ssm get-command-invocation --command-id "$CID" --instance-id "${{ secrets.EC2_INSTANCE_ID }}" --region ap-southeast-2 --query 'StandardErrorContent' --output text || echo "(取得失敗)"
            echo "::error::主要テーブル存在確認 SQL の実行に失敗（Status=$ST）"
            exit 1
          fi

          ACTUAL_COUNT=$(aws ssm get-command-invocation \
            --command-id "$CID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --region ap-southeast-2 \
            --query 'StandardOutputContent' --output text | tr -d '[:space:]')

          echo "期待: ${EXPECTED_COUNT} 件 / 実測: ${ACTUAL_COUNT} 件"

          if [ -z "$ACTUAL_COUNT" ] || ! [[ "$ACTUAL_COUNT" =~ ^[0-9]+$ ]]; then
            echo "::error::主要テーブル件数の取得に失敗（出力が数値でない: '${ACTUAL_COUNT}'）"
            exit 1
          fi

          if [ "$ACTUAL_COUNT" -lt "$EXPECTED_COUNT" ]; then
            # 不足テーブルを特定（実在テーブル一覧を取得して required との差分を出す）
            DIFF_SQL="SELECT table_name FROM information_schema.tables WHERE table_schema='amazia' AND table_name IN (${IN_LIST}) ORDER BY table_name;"
            DIFF_PARAMS_JSON=$(jq -n --arg sql "$DIFF_SQL" '{
              commands: [
                ("docker exec amazia-mysql sh -c \"mysql -uroot -p$MYSQL_ROOT_PASSWORD amazia -N -e \\\"" + $sql + "\\\"\"")
              ]
            }')
            DIFF_CID=$(aws ssm send-command \
              --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
              --region ap-southeast-2 \
              --document-name "AWS-RunShellScript" \
              --parameters "$DIFF_PARAMS_JSON" \
              --query 'Command.CommandId' --output text)
            for i in $(seq 1 12); do
              sleep 5
              DIFF_ST=$(aws ssm get-command-invocation --command-id "$DIFF_CID" --instance-id "${{ secrets.EC2_INSTANCE_ID }}" --region ap-southeast-2 --query 'Status' --output text 2>/dev/null || echo "Pending")
              [ "$DIFF_ST" = "Success" ] && break
              if [ "$DIFF_ST" = "Failed" ] || [ "$DIFF_ST" = "TimedOut" ] || [ "$DIFF_ST" = "Cancelled" ]; then
                break
              fi
            done
            EXISTING=$(aws ssm get-command-invocation --command-id "$DIFF_CID" --instance-id "${{ secrets.EC2_INSTANCE_ID }}" --region ap-southeast-2 --query 'StandardOutputContent' --output text 2>/dev/null | tr -s '[:space:]' '\n' | grep -v '^$' | sort -u || true)
            REQUIRED=$(echo "$TABLES" | tr ',' '\n' | sort -u)
            echo "===== 不足テーブル ====="
            comm -23 <(echo "$REQUIRED") <(echo "$EXISTING") || echo "(差分取得失敗)"
            echo "::error::主要テーブルが ${EXPECTED_COUNT} 件中 ${ACTUAL_COUNT} 件しか存在しない"
            exit 1
          fi

          echo "主要テーブル ${EXPECTED_COUNT} 件すべて存在を確認"

      - name: ヘルスチェック - 起動ログの schema 関連 WARN 抽出
        # 改善② Core コンテナのログから schema.sql 由来の WARN を抽出して
        # ::warning:: で表示する（fail はしない）。
        # 044 で「DDL 失敗が WARN で潰された」事象が再発しても気付ける運用にする。
        if: success()
        run: |
          set -uo pipefail

          # 既にヘルスチェックで Core 200 を確認済みのため追加 sleep は不要。
          # docker logs --since 5m で直近の起動ログをカバーする。
          PARAMS_JSON=$(jq -n '{
            commands: [
              "docker logs --since 5m amazia-core 2>&1 | grep -iE \"WARN.*(sql\\.init|schema|DDL|ALTER|CREATE TABLE|FOREIGN KEY)\" || true"
            ]
          }')
          CID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --region ap-southeast-2 \
            --document-name "AWS-RunShellScript" \
            --parameters "$PARAMS_JSON" \
            --query 'Command.CommandId' --output text)

          ST=Pending
          for i in $(seq 1 12); do
            sleep 5
            ST=$(aws ssm get-command-invocation \
              --command-id "$CID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --region ap-southeast-2 \
              --query 'Status' --output text 2>/dev/null || echo "Pending")
            [ "$ST" = "Success" ] && break
            if [ "$ST" = "Failed" ] || [ "$ST" = "TimedOut" ] || [ "$ST" = "Cancelled" ]; then
              break
            fi
          done

          if [ "$ST" != "Success" ]; then
            # 抽出失敗は CD 失敗にしない（観測ステップなので情報出して続行）
            echo "::warning::Core 起動 WARN 抽出 SSM コマンドが失敗（Status=$ST）。デプロイは成功扱いで継続"
            exit 0
          fi

          OUT=$(aws ssm get-command-invocation \
            --command-id "$CID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --region ap-southeast-2 \
            --query 'StandardOutputContent' --output text)

          if [ -n "$(echo "$OUT" | tr -d '[:space:]')" ]; then
            echo "::warning::Core 起動時に schema 関連の WARN が検出されました。詳細を確認してください。"
            echo "===== Core 起動 schema 関連 WARN ====="
            echo "$OUT"
            echo "======================================"
          else
            echo "Core 起動 schema 関連 WARN なし"
          fi

      - name: 本番 DB スキーマスナップショット保存
        # 改善④ mysqldump --no-data で DDL のみを取得し S3 に日次保存。
        # 週次レビューで schema.sql との差分を人手確認する用途（自動アラートなし）。
        # S3 ライフサイクル: prefix=schema-snapshots/ で 90日後 Glacier Deep Archive、365日後 Expire（コンソール側設定）。
        if: success()
        run: |
          set -uo pipefail
          DATE=$(date -u +%Y-%m-%d)
          S3_KEY="schema-snapshots/${DATE}.sql"
          S3_URI="s3://fullstack-renaissance-demo/${S3_KEY}"

          # MYSQL_ROOT_PASSWORD は EC2 上の .env から解決させる。
          # mysqldump は標準出力に DDL を吐き、aws s3 cp - で直接アップロード（中間ファイル不要）。
          PARAMS_JSON=$(jq -n --arg uri "$S3_URI" '{
            commands: [
              ("docker exec amazia-mysql sh -c \"mysqldump --no-data --no-tablespaces -uroot -p$MYSQL_ROOT_PASSWORD amazia\" | aws s3 cp - " + $uri)
            ]
          }')
          CID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --region ap-southeast-2 \
            --document-name "AWS-RunShellScript" \
            --parameters "$PARAMS_JSON" \
            --query 'Command.CommandId' --output text)

          ST=Pending
          for i in $(seq 1 12); do
            sleep 5
            ST=$(aws ssm get-command-invocation \
              --command-id "$CID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --region ap-southeast-2 \
              --query 'Status' --output text 2>/dev/null || echo "Pending")
            [ "$ST" = "Success" ] && break
            if [ "$ST" = "Failed" ] || [ "$ST" = "TimedOut" ] || [ "$ST" = "Cancelled" ]; then
              break
            fi
          done

          if [ "$ST" != "Success" ]; then
            # スナップショットは品質改善目的の補助機構。失敗しても CD は成功扱いで継続。
            echo "::warning::スキーマスナップショット保存に失敗（Status=$ST）。デプロイは成功扱いで継続"
            aws ssm get-command-invocation --command-id "$CID" --instance-id "${{ secrets.EC2_INSTANCE_ID }}" --region ap-southeast-2 --query 'StandardErrorContent' --output text || true
            exit 0
          fi

          echo "スキーマスナップショット保存: ${S3_URI}"
