name: Deploy to EC2

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - '**.md'

jobs:
  test-core:
    name: amazia-core テスト
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Run tests
        working-directory: amazia-core
        run: mvn clean test

  test-console:
    name: amazia-console テスト
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo, sqlite3, gd, zip
      - name: Install dependencies
        working-directory: amazia-console
        run: composer install --no-interaction --prefer-dist
      - name: Copy .env
        working-directory: amazia-console
        run: cp .env.example .env
      - name: Generate app key
        working-directory: amazia-console
        run: php artisan key:generate
      - name: Run tests
        working-directory: amazia-console
        run: php artisan test

  test-market:
    name: amazia-market ビルド確認
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        working-directory: amazia-market
        run: npm install
      - name: Build
        working-directory: amazia-market
        run: npm run build

  deploy:
    name: EC2へデプロイ
    runs-on: ubuntu-latest
    needs: [test-core, test-console, test-market]
    steps:
      - uses: actions/checkout@v4

      - name: AWSクレデンシャル設定
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2

      - name: SSMキュー健全性確認・自動リカバリ
        run: |
          # 15分以上前からInProgressのコマンドを詰まりと判定
          # JMESPathは&&未対応のため、jqで2段階フィルタ
          THRESHOLD=$(date -u -d '15 minutes ago' +%Y-%m-%dT%H:%M:%S 2>/dev/null \
            || date -u -v-15M +%Y-%m-%dT%H:%M:%S)

          STUCK=$(aws ssm list-commands \
            --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
            --region ap-southeast-2 \
            --query "Commands[?Status=='InProgress']" \
            --output json \
            | jq --arg threshold "$THRESHOLD" \
              '[.[] | select(.RequestedDateTime < $threshold)] | length')

          echo "15分超InProgressコマンド数: $STUCK"

          if [ "$STUCK" -gt 0 ]; then
            echo "SSMキューが詰まっています。EC2を再起動してクリアします..."
            aws ec2 stop-instances \
              --instance-ids ${{ secrets.EC2_INSTANCE_ID }} --region ap-southeast-2
            aws ec2 wait instance-stopped \
              --instance-ids ${{ secrets.EC2_INSTANCE_ID }} --region ap-southeast-2
            aws ec2 start-instances \
              --instance-ids ${{ secrets.EC2_INSTANCE_ID }} --region ap-southeast-2

            ONLINE=false
            for i in $(seq 1 18); do
              sleep 10
              STATUS=$(aws ssm describe-instance-information \
                --region ap-southeast-2 \
                --query "InstanceInformationList[?InstanceId=='${{ secrets.EC2_INSTANCE_ID }}'].PingStatus" \
                --output text)
              echo "[$i] SSM: $STATUS"
              if [ "$STATUS" = "Online" ]; then
                ONLINE=true
                break
              fi
            done

            if [ "$ONLINE" = "false" ]; then
              echo "ERROR: SSM Online確認タイムアウト（180秒）"
              exit 1
            fi
            echo "SSM Online確認。デプロイを継続します。"
          else
            echo "SSMキュー正常。デプロイを開始します。"
          fi

      - name: ECRログイン
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: amazia-core イメージビルド・ECR push
        run: |
          docker build -t amazia-core ./amazia-core
          docker tag amazia-core:latest 741011674945.dkr.ecr.ap-southeast-2.amazonaws.com/amazia-core:latest
          docker push 741011674945.dkr.ecr.ap-southeast-2.amazonaws.com/amazia-core:latest

      - name: amazia-console イメージビルド・ECR push
        run: |
          docker build -t amazia-console ./amazia-console
          docker tag amazia-console:latest 741011674945.dkr.ecr.ap-southeast-2.amazonaws.com/amazia-console:latest
          docker push 741011674945.dkr.ecr.ap-southeast-2.amazonaws.com/amazia-console:latest

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: amazia-market ビルド
        working-directory: amazia-market
        run: npm install && npm run build

      - name: amazia-console Vue ビルド
        working-directory: amazia-console/resources/vue
        run: npm install && npm run build

      - name: S3にzipをアップロード
        run: |
          ls amazia-console/public/vue/ || echo "WARNING: vue dist not found"
          ls amazia-market/dist/ || echo "WARNING: market dist not found"
          zip -r amazia.zip . \
            -x "*.git*" \
            -x "amazia-core/target/*" \
            -x "amazia-console/vendor/*" \
            -x "amazia-console/resources/vue/node_modules/*" \
            -x "amazia-market/node_modules/*"
          aws s3 cp amazia.zip s3://fullstack-renaissance-demo/amazia.zip

      - name: EC2 - Docker停止・ECR pull・Docker起動
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --parameters commands='[
              "cd /home/ssm-user/amazia && docker-compose down || true",
              "aws ecr get-login-password --region ap-southeast-2 | docker login --username AWS --password-stdin 741011674945.dkr.ecr.ap-southeast-2.amazonaws.com",
              "docker pull 741011674945.dkr.ecr.ap-southeast-2.amazonaws.com/amazia-core:latest",
              "docker pull 741011674945.dkr.ecr.ap-southeast-2.amazonaws.com/amazia-console:latest",
              "aws s3 cp s3://fullstack-renaissance-demo/amazia.zip /home/ssm-user/amazia.zip",
              "cd /home/ssm-user && unzip -o amazia.zip -d amazia",
              "cd /home/ssm-user/amazia && APP_KEY=\"${{ secrets.LARAVEL_APP_KEY }}\" CORS_ALLOWED_ORIGINS=\"http://13.54.203.95,http://13.54.203.95:5173\" docker-compose up -d"
            ]' \
            --region ap-southeast-2 \
            --query "Command.CommandId" --output text)
          echo "CommandId: $COMMAND_ID"
          for i in $(seq 1 24); do
            sleep 15
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
              --region ap-southeast-2 \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "[$i] Status: $STATUS"
            if [ "$STATUS" = "Success" ]; then break; fi
            if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "TimedOut" ]; then
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
                --region ap-southeast-2 \
                --query "StandardErrorContent" --output text
              exit 1
            fi
          done

      - name: EC2 - Nginx設定とフロントエンド配置
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --parameters commands='[
              "sudo cp /home/ssm-user/amazia/nginx/amazia.conf /etc/nginx/conf.d/amazia.conf && sudo rm -f /etc/nginx/conf.d/default.conf",
              "sudo cp -r /home/ssm-user/amazia/amazia-market/dist/. /var/www/amazia-market/",
              "sudo cp -r /home/ssm-user/amazia/amazia-console/public/vue/. /var/www/amazia-console/",
              "sudo chown -R nginx:nginx /var/www/amazia-market /var/www/amazia-console",
              "sudo nginx -t && sudo systemctl reload nginx"
            ]' \
            --region ap-southeast-2 \
            --query "Command.CommandId" --output text)
          echo "CommandId: $COMMAND_ID"
          for i in $(seq 1 12); do
            sleep 10
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
              --region ap-southeast-2 \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "[$i] Status: $STATUS"
            if [ "$STATUS" = "Success" ]; then break; fi
            if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "TimedOut" ]; then
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
                --region ap-southeast-2 \
                --query "StandardErrorContent" --output text
              exit 1
            fi
          done

      - name: デプロイ後ヘルスチェック
        run: |
          echo "サービス応答確認中..."
          for i in $(seq 1 12); do
            sleep 10
            MARKET=$(curl -s -o /dev/null -w "%{http_code}" http://13.54.203.95 2>/dev/null || echo "000")
            CONSOLE=$(curl -s -o /dev/null -w "%{http_code}" http://13.54.203.95:8001 2>/dev/null || echo "000")
            CORE=$(curl -s -o /dev/null -w "%{http_code}" http://13.54.203.95:8080/api/products 2>/dev/null || echo "000")
            MARKET_CONTAINER=$(curl -s -o /dev/null -w "%{http_code}" http://13.54.203.95:5173 2>/dev/null || echo "000")
            echo "[$i] market(nginx):$MARKET console:$CONSOLE core:$CORE market(container):$MARKET_CONTAINER"
            if [ "$MARKET" = "200" ] && [ "$CONSOLE" = "200" ] && [ "$CORE" = "200" ] && [ "$MARKET_CONTAINER" = "200" ]; then
              echo "全サービス正常応答を確認"
              exit 0
            fi
          done
          echo "ERROR: ヘルスチェックタイムアウト"
          exit 1
