name: Deploy to EC2

on:
  push:
    branches:
      - main
    paths:
      - 'amazia-core/**'
      - 'amazia-console/**'
      - 'amazia-market/**'
      - 'docker-compose.yml'
      - 'nginx/**'
  workflow_dispatch:

jobs:
  test-core:
    name: amazia-core テスト
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Run tests
        working-directory: amazia-core
        run: mvn clean test

  test-market:
    name: amazia-market テスト
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        working-directory: amazia-market
        run: npm install
      - name: Run tests
        working-directory: amazia-market
        run: npm test

  test-console:
    name: amazia-console テスト
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo, sqlite3, gd, zip
      - name: Install dependencies
        working-directory: amazia-console
        run: composer install --no-interaction --prefer-dist
      - name: Copy .env
        working-directory: amazia-console
        run: cp .env.example .env
      - name: Generate app key
        working-directory: amazia-console
        run: php artisan key:generate
      - name: Run tests
        working-directory: amazia-console
        run: php artisan test

  deploy:
    name: EC2へデプロイ
    runs-on: ubuntu-latest
    needs: [test-core, test-console, test-market]
    steps:
      - uses: actions/checkout@v4

      - name: AWSクレデンシャル設定
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2

      - name: SSMキュー健全性確認・自動リカバリ
        run: |
          INSTANCE_ID="${{ secrets.EC2_INSTANCE_ID }}"
          REGION="ap-southeast-2"

          # SSM Agent にカナリアコマンドを送って実配信できるか確認する
          # PingStatus=Online でも MGS セッションが死んでいると Undeliverable になる
          # 「ゾンビOnline」状態を検知するための関数。
          # 戻り値: 0=配信成功, 1=配信失敗 (Undeliverable / TimedOut / Pending滞留)
          canary_check() {
            local LABEL="$1"
            echo "===== カナリアコマンド送信 ($LABEL) ====="
            local CID
            CID=$(aws ssm send-command \
              --instance-ids "$INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --parameters commands='["echo canary-ok"]' \
              --region "$REGION" \
              --query "Command.CommandId" --output text)
            echo "Canary CommandId: $CID"
            for i in $(seq 1 12); do
              sleep 10
              local ST
              ST=$(aws ssm get-command-invocation \
                --command-id "$CID" \
                --instance-id "$INSTANCE_ID" \
                --region "$REGION" \
                --query "Status" --output text 2>/dev/null || echo "Pending")
              echo "[canary $i] $ST"
              if [ "$ST" = "Success" ]; then
                return 0
              fi
              if [ "$ST" = "Failed" ] || [ "$ST" = "TimedOut" ] || [ "$ST" = "Cancelled" ]; then
                local DETAILS
                DETAILS=$(aws ssm get-command-invocation \
                  --command-id "$CID" \
                  --instance-id "$INSTANCE_ID" \
                  --region "$REGION" \
                  --query "StatusDetails" --output text 2>/dev/null || echo "unknown")
                echo "カナリア失敗: StatusDetails=$DETAILS"
                return 1
              fi
            done
            echo "カナリアタイムアウト（120秒 Pending 滞留）→ 配信不能と判定"
            aws ssm cancel-command --command-id "$CID" --region "$REGION" 2>/dev/null || true
            return 1
          }

          # EC2 stop/start + Online 連続検知 + 60秒安定化待機
          recover_ssm() {
            echo "EC2を再起動してSSMをリカバリします..."
            aws ec2 stop-instances --instance-ids "$INSTANCE_ID" --region "$REGION"
            aws ec2 wait instance-stopped --instance-ids "$INSTANCE_ID" --region "$REGION"
            aws ec2 start-instances --instance-ids "$INSTANCE_ID" --region "$REGION"

            # PingStatus=Online は SSM Agent のハートビート成立のみを示し
            # コマンド受信パイプラインの起動完了とは別。連続3回 Online + 60秒待機。
            local STREAK=0 OK=false
            for i in $(seq 1 30); do
              sleep 10
              local STATUS
              STATUS=$(aws ssm describe-instance-information \
                --region "$REGION" \
                --query "InstanceInformationList[?InstanceId=='$INSTANCE_ID'].PingStatus" \
                --output text)
              echo "[$i] SSM: ${STATUS:-(empty)} (streak=$STREAK)"
              if [ "$STATUS" = "Online" ]; then
                STREAK=$((STREAK + 1))
                if [ "$STREAK" -ge 3 ]; then
                  OK=true
                  break
                fi
              else
                STREAK=0
              fi
            done
            if [ "$OK" = "false" ]; then
              echo "ERROR: SSM Online連続検知タイムアウト（300秒）"
              return 1
            fi
            echo "SSM Online連続確認。コマンドパイプライン安定化のため60秒待機..."
            sleep 60
            echo "SSM 安定化待機完了。"
          }

          # ----- 第1段階: キュー詰まり / PingStatus 確認 -----
          # 15分以上前からInProgressのコマンドを詰まりと判定
          # JMESPathは&&未対応のため、jqで2段階フィルタ
          THRESHOLD=$(date -u -d '15 minutes ago' +%Y-%m-%dT%H:%M:%S 2>/dev/null \
            || date -u -v-15M +%Y-%m-%dT%H:%M:%S)

          STUCK=$(aws ssm list-commands \
            --instance-id "$INSTANCE_ID" \
            --region "$REGION" \
            --query "Commands[?Status=='InProgress']" \
            --output json \
            | jq --arg threshold "$THRESHOLD" \
              '[.[] | select(.RequestedDateTime < $threshold)] | length')
          echo "15分超InProgressコマンド数: $STUCK"

          PING=$(aws ssm describe-instance-information \
            --region "$REGION" \
            --query "InstanceInformationList[?InstanceId=='$INSTANCE_ID'].PingStatus" \
            --output text)
          echo "SSM PingStatus: ${PING:-NotRegistered}"

          NEEDS_RECOVERY=false
          if [ "$STUCK" -gt 0 ]; then
            echo "判定: SSMキュー詰まり"
            NEEDS_RECOVERY=true
          fi
          if [ "$PING" != "Online" ]; then
            echo "判定: SSM未接続 (PingStatus=${PING:-NotRegistered})"
            NEEDS_RECOVERY=true
          fi

          if [ "$NEEDS_RECOVERY" = "true" ]; then
            recover_ssm || exit 1
          else
            echo "SSMキュー・PingStatusは正常。"
          fi

          # ----- 第2段階: カナリアで実配信を確認（ゾンビOnline検知） -----
          if ! canary_check "1回目"; then
            echo "PingStatus=Online でもカナリア配信失敗 → ゾンビOnlineと判定しリカバリ実行"
            recover_ssm || exit 1
            if ! canary_check "リカバリ後"; then
              echo "ERROR: リカバリ後もカナリア配信失敗。手動調査が必要。"
              exit 1
            fi
          fi
          echo "SSM 配信確認OK。デプロイを開始します。"

      - name: ECRログイン
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: amazia-core イメージビルド・ECR push
        run: |
          docker build -t amazia-core ./amazia-core
          docker tag amazia-core:latest 741011674945.dkr.ecr.ap-southeast-2.amazonaws.com/amazia-core:latest
          docker push 741011674945.dkr.ecr.ap-southeast-2.amazonaws.com/amazia-core:latest

      - name: amazia-console イメージビルド・ECR push
        run: |
          docker build -t amazia-console ./amazia-console
          docker tag amazia-console:latest 741011674945.dkr.ecr.ap-southeast-2.amazonaws.com/amazia-console:latest
          docker push 741011674945.dkr.ecr.ap-southeast-2.amazonaws.com/amazia-console:latest

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: amazia-market ビルド
        working-directory: amazia-market
        run: npm install && npm run build

      - name: amazia-console Vue ビルド
        # フェーズX-3: HTTPS（CloudFront）化時は VITE_BASE_PATH=/console/ をセットして
        # Vue/Vite を /console/ 配下で動かす。Variables/Secrets の HTTPS_ENABLED=true で切替。
        working-directory: amazia-console/resources/vue
        env:
          VITE_BASE_PATH: ${{ vars.HTTPS_ENABLED == 'true' && '/console/' || '/' }}
        run: npm install && npm run build

      - name: S3にzipをアップロード
        run: |
          ls amazia-console/public/vue/ || echo "WARNING: vue dist not found"
          ls amazia-market/dist/ || echo "WARNING: market dist not found"
          zip -r amazia.zip . \
            -x "*.git*" \
            -x "amazia-core/target/*" \
            -x "amazia-console/vendor/*" \
            -x "amazia-console/resources/vue/node_modules/*" \
            -x "amazia-market/node_modules/*"
          aws s3 cp amazia.zip s3://fullstack-renaissance-demo/amazia.zip

      - name: EC2 - Docker停止・ECR pull・Docker起動
        # フェーズX-3: HTTPS（CloudFront）化時は HTTPS_ENABLED=true を GitHub Variables にセット。
        # 環境変数で CORS / Cookie Secure / Cookie Domain / Cookie Path / Password Reset URL を切替。
        env:
          HTTPS_ENABLED: ${{ vars.HTTPS_ENABLED }}
          DEPLOY_DOMAIN: ${{ vars.DEPLOY_DOMAIN || 'www.amazia-portfolio.dedyn.io' }}
        run: |
          if [ "$HTTPS_ENABLED" = "true" ]; then
            CORS_ORIGINS="https://${DEPLOY_DOMAIN}"
            PASSWORD_RESET_URL="https://${DEPLOY_DOMAIN}/console/password/reset/confirm"
            REFRESH_COOKIE_SECURE="true"
            REFRESH_COOKIE_DOMAIN="${DEPLOY_DOMAIN}"
            REFRESH_COOKIE_PATH="/console/api/auth/refresh"
            SESSION_SECURE_COOKIE="true"
            SESSION_DOMAIN="${DEPLOY_DOMAIN}"
          else
            CORS_ORIGINS="http://13.54.203.95,http://13.54.203.95:5173"
            PASSWORD_RESET_URL="http://13.54.203.95:8001/password/reset/confirm"
            REFRESH_COOKIE_SECURE="false"
            REFRESH_COOKIE_DOMAIN=""
            REFRESH_COOKIE_PATH="/api/auth/refresh"
            SESSION_SECURE_COOKIE="false"
            SESSION_DOMAIN=""
          fi
          # SSM の commands 配列は JSON 文字列（ダブルクォート区切り）。
          # シェル変数を埋め込むため jq で安全にエスケープした上で JSON を組み立てる。
          # APP_KEY 等の値内のシングルクォートを避けるため、シェル側ではダブルクォートで囲み、
          # 内部で値内のダブルクォートを使わない構成にする（CORS_ORIGINS にカンマは含まれるが " は含まれない）。
          UP_CMD="cd /home/ssm-user/amazia && APP_KEY='${{ secrets.LARAVEL_APP_KEY }}' CORS_ALLOWED_ORIGINS='${CORS_ORIGINS}' PASSWORD_RESET_URL='${PASSWORD_RESET_URL}' REFRESH_COOKIE_SECURE='${REFRESH_COOKIE_SECURE}' REFRESH_COOKIE_DOMAIN='${REFRESH_COOKIE_DOMAIN}' REFRESH_COOKIE_PATH='${REFRESH_COOKIE_PATH}' SESSION_SECURE_COOKIE='${SESSION_SECURE_COOKIE}' SESSION_DOMAIN='${SESSION_DOMAIN}' docker-compose up -d --remove-orphans"
          PARAMS_JSON=$(jq -n --arg up "$UP_CMD" '{
            commands: [
              "cd /home/ssm-user/amazia && docker-compose down --remove-orphans || true",
              "aws ecr get-login-password --region ap-southeast-2 | docker login --username AWS --password-stdin 741011674945.dkr.ecr.ap-southeast-2.amazonaws.com",
              "docker pull 741011674945.dkr.ecr.ap-southeast-2.amazonaws.com/amazia-core:latest",
              "docker pull 741011674945.dkr.ecr.ap-southeast-2.amazonaws.com/amazia-console:latest",
              "aws s3 cp s3://fullstack-renaissance-demo/amazia.zip /home/ssm-user/amazia.zip",
              "cd /home/ssm-user && unzip -o amazia.zip -d amazia",
              $up
            ]
          }')
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --parameters "$PARAMS_JSON" \
            --region ap-southeast-2 \
            --query "Command.CommandId" --output text)
          echo "CommandId: $COMMAND_ID"
          for i in $(seq 1 24); do
            sleep 15
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
              --region ap-southeast-2 \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "[$i] Status: $STATUS"
            if [ "$STATUS" = "Success" ]; then break; fi
            if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "TimedOut" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "===== StatusDetails ====="
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
                --region ap-southeast-2 \
                --query "StatusDetails" --output text
              echo "===== StandardOutputContent ====="
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
                --region ap-southeast-2 \
                --query "StandardOutputContent" --output text
              echo "===== StandardErrorContent ====="
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
                --region ap-southeast-2 \
                --query "StandardErrorContent" --output text
              exit 1
            fi
          done

      - name: EC2 - Nginx設定とフロントエンド配置
        # フェーズX-3: HTTPS_ENABLED=true なら CloudFront 経由用設定（amazia.cloudfront.conf）を配置。
        # それ以外は従来の amazia.conf を配置（直 IP HTTP 動作維持）。
        env:
          HTTPS_ENABLED: ${{ vars.HTTPS_ENABLED }}
        run: |
          if [ "$HTTPS_ENABLED" = "true" ]; then
            NGINX_SRC="amazia.cloudfront.conf"
          else
            NGINX_SRC="amazia.conf"
          fi
          NGINX_CMD="sudo cp /home/ssm-user/amazia/nginx/${NGINX_SRC} /etc/nginx/conf.d/amazia.conf && sudo rm -f /etc/nginx/conf.d/default.conf"
          PARAMS_JSON=$(jq -n --arg ng "$NGINX_CMD" '{
            commands: [
              $ng,
              "sudo cp -r /home/ssm-user/amazia/amazia-market/dist/. /var/www/amazia-market/",
              "sudo cp -r /home/ssm-user/amazia/amazia-console/public/vue/. /var/www/amazia-console/",
              "sudo chown -R nginx:nginx /var/www/amazia-market /var/www/amazia-console",
              "sudo nginx -t && sudo systemctl reload nginx"
            ]
          }')
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --parameters "$PARAMS_JSON" \
            --region ap-southeast-2 \
            --query "Command.CommandId" --output text)
          echo "CommandId: $COMMAND_ID"
          for i in $(seq 1 12); do
            sleep 10
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
              --region ap-southeast-2 \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "[$i] Status: $STATUS"
            if [ "$STATUS" = "Success" ]; then break; fi
            if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "TimedOut" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "===== StatusDetails ====="
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
                --region ap-southeast-2 \
                --query "StatusDetails" --output text
              echo "===== StandardOutputContent ====="
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
                --region ap-southeast-2 \
                --query "StandardOutputContent" --output text
              echo "===== StandardErrorContent ====="
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
                --region ap-southeast-2 \
                --query "StandardErrorContent" --output text
              exit 1
            fi
          done

      - name: デプロイ後ヘルスチェック
        # フェーズX-3: HTTPS_ENABLED=true の場合は CloudFront 経由 URL で確認。
        # 直 IP HTTP の場合は従来どおり nginx (:80) / console (:8000) / core (:8080) を直叩き。
        env:
          HTTPS_ENABLED: ${{ vars.HTTPS_ENABLED }}
          DEPLOY_DOMAIN: ${{ vars.DEPLOY_DOMAIN || 'www.amazia-portfolio.dedyn.io' }}
        run: |
          if [ "$HTTPS_ENABLED" = "true" ]; then
            MARKET_URL="https://${DEPLOY_DOMAIN}/"
            CONSOLE_URL="https://${DEPLOY_DOMAIN}/console/"
            CORE_URL="https://${DEPLOY_DOMAIN}/api/products"
          else
            MARKET_URL="http://13.54.203.95"
            CONSOLE_URL="http://13.54.203.95:8000"
            CORE_URL="http://13.54.203.95:8080/api/products"
          fi
          echo "サービス応答確認中... (MARKET=$MARKET_URL CONSOLE=$CONSOLE_URL CORE=$CORE_URL)"
          for i in $(seq 1 36); do
            sleep 10
            MARKET=$(curl -s -o /dev/null -w "%{http_code}" "$MARKET_URL" 2>/dev/null || echo "000")
            CONSOLE=$(curl -s -o /dev/null -w "%{http_code}" "$CONSOLE_URL" 2>/dev/null || echo "000")
            CORE=$(curl -s -o /dev/null -w "%{http_code}" "$CORE_URL" 2>/dev/null || echo "000")
            echo "[$i] market:$MARKET console:$CONSOLE core:$CORE"
            if [ "$MARKET" = "200" ] && [ "$CONSOLE" = "200" ] && [ "$CORE" = "200" ]; then
              echo "全サービス正常応答を確認"
              exit 0
            fi
          done
          echo "ERROR: ヘルスチェックタイムアウト"
          exit 1
