name: CI - amazia-core

on:
  push:
    paths:
      - 'amazia-core/**'
  pull_request:
    paths:
      - 'amazia-core/**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Run tests
        working-directory: amazia-core
        run: mvn clean test
