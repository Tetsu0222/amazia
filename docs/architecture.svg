<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 1180" width="960" height="1180" font-family="sans-serif" font-size="13">

  <!-- 背景 -->
  <rect width="960" height="1180" fill="#ffffff"/>

  <!-- タイトル -->
  <text x="480" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#333">Amazia アーキテクチャ図</text>
  <text x="480" y="54" text-anchor="middle" font-size="12" fill="#888">CI/CD（GitHub Actions）／本番（CloudFront + EC2 t3.micro）／開発（ローカル）</text>

  <!-- =========================================
       1. 開発者 → GitHub
  ========================================== -->
  <circle cx="480" cy="100" r="22" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5"/>
  <text x="480" y="105" text-anchor="middle" font-size="12" fill="#333">開発者</text>

  <rect x="430" y="146" width="100" height="40" rx="6" fill="#f5f5f5" stroke="#666" stroke-width="1.5"/>
  <text x="480" y="170" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">GitHub</text>

  <line x1="480" y1="122" x2="480" y2="144" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="500" y="138" font-size="11" fill="#555">git push</text>

  <!-- =========================================
       2. CI/CDパイプライン
  ========================================== -->
  <rect x="60" y="206" width="840" height="170" rx="10" fill="#eaf4fb" stroke="#6c8ebf" stroke-width="2"/>
  <text x="480" y="228" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a6fa0">CI/CD パイプライン（deploy.yml）</text>

  <rect x="100" y="244" width="150" height="46" rx="8" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="175" y="263" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">test-core</text>
  <text x="175" y="280" text-anchor="middle" font-size="11" fill="#555">JUnit</text>

  <rect x="405" y="244" width="150" height="46" rx="8" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="480" y="263" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">test-console</text>
  <text x="480" y="280" text-anchor="middle" font-size="11" fill="#555">PHPUnit</text>

  <rect x="710" y="244" width="150" height="46" rx="8" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="785" y="263" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">test-market</text>
  <text x="785" y="280" text-anchor="middle" font-size="11" fill="#555">npm test</text>

  <rect x="380" y="316" width="200" height="46" rx="8" fill="#ffe6cc" stroke="#d6b656" stroke-width="1.5"/>
  <text x="480" y="335" text-anchor="middle" font-size="12" font-weight="bold" fill="#7a3d00">deploy</text>
  <text x="480" y="352" text-anchor="middle" font-size="11" fill="#555">全グリーン後 / SSM 経由</text>

  <line x1="175" y1="290" x2="430" y2="316" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="480" y1="290" x2="480" y2="314" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="785" y1="290" x2="530" y2="316" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <line x1="480" y1="186" x2="480" y2="204" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- =========================================
       3. アーティファクト（ECR / S3）
  ========================================== -->
  <rect x="170" y="404" width="200" height="60" rx="8" fill="#fff3e0" stroke="#FF9900" stroke-width="2"/>
  <text x="270" y="427" text-anchor="middle" font-size="13" font-weight="bold" fill="#7a4500">Amazon ECR</text>
  <text x="270" y="445" text-anchor="middle" font-size="11" fill="#555">amazia-core / amazia-console</text>
  <text x="270" y="459" text-anchor="middle" font-size="11" fill="#555">:latest</text>

  <rect x="590" y="404" width="200" height="60" rx="8" fill="#fff3e0" stroke="#FF9900" stroke-width="2"/>
  <text x="690" y="427" text-anchor="middle" font-size="13" font-weight="bold" fill="#7a4500">Amazon S3</text>
  <text x="690" y="445" text-anchor="middle" font-size="11" fill="#555">fullstack-renaissance-demo</text>
  <text x="690" y="459" text-anchor="middle" font-size="11" fill="#555">amazia.zip</text>

  <line x1="380" y1="362" x2="290" y2="402" stroke="#FF9900" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <text x="290" y="390" text-anchor="middle" font-size="11" fill="#FF9900">docker push</text>

  <line x1="580" y1="362" x2="670" y2="402" stroke="#FF9900" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <text x="670" y="390" text-anchor="middle" font-size="11" fill="#FF9900">aws s3 cp</text>

  <!-- =========================================
       4. 本番 EC2（t3.micro）
  ========================================== -->
  <rect x="60" y="500" width="840" height="320" rx="12" fill="#fff2cc" stroke="#d6b656" stroke-width="2"/>
  <text x="480" y="524" text-anchor="middle" font-size="14" font-weight="bold" fill="#8a6a00">AWS EC2  t3.micro（無料枠）  EIP 13.54.203.95  ap-southeast-2</text>
  <text x="480" y="542" text-anchor="middle" font-size="11" fill="#7a4500">SSM 管理（SSH不要） / Spring -Xmx384m / Swap 2GB（phaseX-4）</text>

  <!-- Nginx -->
  <rect x="80" y="556" width="800" height="60" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
  <text x="480" y="575" text-anchor="middle" font-size="12" font-weight="bold" fill="#1b5e20">Nginx（リバースプロキシ・パス分離 / amazia.cloudfront.conf）</text>
  <text x="480" y="592" text-anchor="middle" font-size="11" fill="#555">/ → Market 静的　 /console/ → Console SPA　 /console/api/ → :8000　 /api/ → :8080</text>
  <text x="480" y="608" text-anchor="middle" font-size="11" fill="#888">直 IP アクセスは default_server で 444 切断（CloudFront 経由のみ受付）</text>

  <!-- Docker Compose 枠 -->
  <rect x="80" y="630" width="800" height="180" rx="8" fill="#f8cecc" stroke="#b85450" stroke-width="1.5"/>
  <text x="480" y="650" text-anchor="middle" font-size="13" font-weight="bold" fill="#7a1f00">Docker Compose</text>

  <!-- amazia-core -->
  <rect x="120" y="660" width="220" height="70" rx="8" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5"/>
  <text x="230" y="681" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a3a6a">amazia-core</text>
  <text x="230" y="699" text-anchor="middle" font-size="11" fill="#555">Java / Spring Boot</text>
  <text x="230" y="715" text-anchor="middle" font-size="11" fill="#555">:8080  ( -Xmx384m )</text>

  <!-- amazia-console -->
  <rect x="370" y="660" width="220" height="70" rx="8" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5"/>
  <text x="480" y="681" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a3a6a">amazia-console</text>
  <text x="480" y="699" text-anchor="middle" font-size="11" fill="#555">PHP / Laravel</text>
  <text x="480" y="715" text-anchor="middle" font-size="11" fill="#555">:8000</text>

  <!-- MySQL -->
  <rect x="620" y="660" width="220" height="70" rx="8" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="730" y="681" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b5e20">MySQL</text>
  <text x="730" y="699" text-anchor="middle" font-size="11" fill="#555">:3306（volume永続化）</text>

  <line x1="370" y1="695" x2="345" y2="695" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="590" y1="695" x2="615" y2="695" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <line x1="230" y1="730" x2="700" y2="730" stroke="#555" stroke-width="1.2" stroke-dasharray="3,3"/>
  <line x1="480" y1="730" x2="480" y2="745" stroke="#555" stroke-width="1.2"/>
  <text x="500" y="745" font-size="11" fill="#555">JDBC / PDO</text>

  <!-- ECR / S3 → EC2 -->
  <line x1="270" y1="464" x2="270" y2="498" stroke="#6c8ebf" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-blue)"/>
  <text x="200" y="484" font-size="11" fill="#6c8ebf">docker pull (SSM)</text>

  <line x1="690" y1="464" x2="690" y2="498" stroke="#6c8ebf" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-blue)"/>
  <text x="700" y="484" font-size="11" fill="#6c8ebf">unzip (SSM)</text>

  <!-- =========================================
       5. CloudFront / DNS
  ========================================== -->
  <rect x="60" y="848" width="840" height="120" rx="10" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
  <text x="480" y="870" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d47a1">HTTPS 終端層（phaseX-3 / 恒久 $0）</text>

  <rect x="90" y="884" width="240" height="70" rx="8" fill="#fff" stroke="#1976d2" stroke-width="1.5"/>
  <text x="210" y="905" text-anchor="middle" font-size="12" font-weight="bold" fill="#0d47a1">CloudFront</text>
  <text x="210" y="922" text-anchor="middle" font-size="11" fill="#555">ACM 証明書（us-east-1）</text>
  <text x="210" y="937" text-anchor="middle" font-size="11" fill="#555">パス分離 4 Behaviors</text>
  <text x="210" y="950" text-anchor="middle" font-size="10" fill="#888">d30j0e0y4f4ybd.cloudfront.net</text>

  <rect x="360" y="884" width="240" height="70" rx="8" fill="#fff" stroke="#1976d2" stroke-width="1.5"/>
  <text x="480" y="905" text-anchor="middle" font-size="12" font-weight="bold" fill="#0d47a1">desec.io DDNS</text>
  <text x="480" y="922" text-anchor="middle" font-size="11" fill="#555">www.amazia-portfolio.dedyn.io</text>
  <text x="480" y="937" text-anchor="middle" font-size="11" fill="#555">→ CloudFront (CNAME)</text>
  <text x="480" y="950" text-anchor="middle" font-size="10" fill="#888">origin → 13.54.203.95 (A)</text>

  <rect x="630" y="884" width="240" height="70" rx="8" fill="#fff" stroke="#1976d2" stroke-width="1.5"/>
  <text x="750" y="905" text-anchor="middle" font-size="12" font-weight="bold" fill="#0d47a1">CloudFront → EC2</text>
  <text x="750" y="922" text-anchor="middle" font-size="11" fill="#555">HTTP（学習用途で許容）</text>
  <text x="750" y="937" text-anchor="middle" font-size="11" fill="#555">Host ヘッダ検証で直 IP 遮断</text>
  <text x="750" y="950" text-anchor="middle" font-size="10" fill="#888">無料枠 1TB/月 内</text>

  <!-- CloudFront → EC2 -->
  <line x1="210" y1="884" x2="210" y2="822" stroke="#1976d2" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-darkblue-up)"/>
  <text x="120" y="850" font-size="11" fill="#1976d2">origin (HTTP)</text>

  <!-- =========================================
       6. ブラウザ / クライアント
  ========================================== -->
  <rect x="60" y="998" width="840" height="160" rx="10" fill="#e1d5e7" stroke="#9673a6" stroke-width="1.5"/>
  <text x="480" y="1020" text-anchor="middle" font-size="14" font-weight="bold" fill="#4a148c">クライアント（HTTPS 統一・1 ドメイン）</text>

  <rect x="90" y="1036" width="370" height="100" rx="8" fill="#fff" stroke="#9673a6" stroke-width="1.5"/>
  <text x="275" y="1058" text-anchor="middle" font-size="13" font-weight="bold" fill="#4a148c">Amazia Market（会員向け）</text>
  <text x="275" y="1078" text-anchor="middle" font-size="12" fill="#333">https://www.amazia-portfolio.dedyn.io/</text>
  <text x="275" y="1095" text-anchor="middle" font-size="11" fill="#555">React / MUI（静的配信）</text>
  <text x="275" y="1115" text-anchor="middle" font-size="11" fill="#555">/api/* → Core API（Spring Boot）</text>

  <rect x="500" y="1036" width="370" height="100" rx="8" fill="#fff" stroke="#9673a6" stroke-width="1.5"/>
  <text x="685" y="1058" text-anchor="middle" font-size="13" font-weight="bold" fill="#4a148c">Amazia Console UI（管理者向け）</text>
  <text x="685" y="1078" text-anchor="middle" font-size="12" fill="#333">https://www.amazia-portfolio.dedyn.io/console/</text>
  <text x="685" y="1095" text-anchor="middle" font-size="11" fill="#555">Vue / Ant Design  base=/console/</text>
  <text x="685" y="1115" text-anchor="middle" font-size="11" fill="#555">/console/api/* → Console API（Laravel）</text>

  <line x1="275" y1="1036" x2="275" y2="970" stroke="#9673a6" stroke-width="1.5" marker-end="url(#arrow-purple-up)"/>
  <line x1="685" y1="1036" x2="685" y2="970" stroke="#9673a6" stroke-width="1.5" marker-end="url(#arrow-purple-up)"/>
  <text x="295" y="1000" font-size="11" fill="#9673a6">HTTPS</text>
  <text x="705" y="1000" font-size="11" fill="#9673a6">HTTPS</text>

  <!-- 矢印マーカー定義 -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6c8ebf"/>
    </marker>
    <marker id="arrow-darkblue-up" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#FF9900"/>
    </marker>
    <marker id="arrow-purple-up" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#9673a6"/>
    </marker>
  </defs>

</svg>
