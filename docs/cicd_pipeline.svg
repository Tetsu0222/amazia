<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1060" width="900" height="1060" font-family="sans-serif" font-size="13">

  <!-- ===== 背景 ===== -->
  <rect width="900" height="1060" fill="#f9f9f9"/>

  <!-- ===== タイトル ===== -->
  <text x="450" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#333">CI/CD パイプライン アーキテクチャ</text>
  <text x="450" y="56" text-anchor="middle" font-size="12" fill="#888">GitHub Actions → ECR / S3 → EC2 (SSM)</text>

  <!-- ========================================
       1. 開発者 → GitHub
  ======================================== -->
  <!-- 開発者 -->
  <circle cx="110" cy="110" r="22" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5"/>
  <text x="110" y="115" text-anchor="middle" font-size="12" fill="#333">開発者</text>
  <!-- GitHub -->
  <rect x="220" y="88" width="100" height="44" rx="8" fill="#f5f5f5" stroke="#666" stroke-width="1.5"/>
  <text x="270" y="107" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">GitHub</text>
  <text x="270" y="123" text-anchor="middle" font-size="11" fill="#555">main branch</text>
  <!-- 矢印 -->
  <line x1="132" y1="110" x2="218" y2="110" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="175" y="104" text-anchor="middle" font-size="11" fill="#555">git push</text>

  <!-- ========================================
       2. GitHub Actions 全体枠
  ======================================== -->
  <rect x="30" y="160" width="840" height="450" rx="12" fill="#eaf4fb" stroke="#6c8ebf" stroke-width="2"/>
  <text x="450" y="185" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a6fa0">GitHub Actions（deploy.yml）</text>

  <!-- trigger 矢印 GitHub → Actions -->
  <line x1="270" y1="132" x2="270" y2="158" stroke="#6c8ebf" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="290" y="150" font-size="11" fill="#1a6fa0">trigger</text>

  <!-- ---- 並列テストジョブ ---- -->
  <!-- test-core -->
  <rect x="60" y="200" width="160" height="70" rx="8" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="140" y="225" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">test-core</text>
  <text x="140" y="242" text-anchor="middle" font-size="11" fill="#555">mvn clean test</text>
  <text x="140" y="258" text-anchor="middle" font-size="11" fill="#555">(JUnit)</text>

  <!-- test-console -->
  <rect x="370" y="200" width="160" height="70" rx="8" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="450" y="225" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">test-console</text>
  <text x="450" y="242" text-anchor="middle" font-size="11" fill="#555">php artisan test</text>
  <text x="450" y="258" text-anchor="middle" font-size="11" fill="#555">(PHPUnit)</text>

  <!-- test-market -->
  <rect x="680" y="200" width="160" height="70" rx="8" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="760" y="225" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">test-market</text>
  <text x="760" y="242" text-anchor="middle" font-size="11" fill="#555">npm run build</text>
  <text x="760" y="258" text-anchor="middle" font-size="11" fill="#555">(ビルド確認)</text>

  <!-- 3本の矢印 → deploy -->
  <line x1="140" y1="270" x2="390" y2="320" stroke="#82b366" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-green)"/>
  <line x1="450" y1="270" x2="450" y2="318" stroke="#82b366" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-green)"/>
  <line x1="760" y1="270" x2="510" y2="320" stroke="#82b366" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-green)"/>
  <text x="450" y="308" text-anchor="middle" font-size="11" fill="#82b366">全グリーン後</text>

  <!-- ---- deploy ジョブ枠 ---- -->
  <rect x="55" y="325" width="780" height="265" rx="10" fill="#fff8e1" stroke="#d6b656" stroke-width="1.5"/>
  <text x="445" y="346" text-anchor="middle" font-size="14" font-weight="bold" fill="#8a6a00">deploy ジョブ</text>

  <!-- Step 1: ECR build & push -->
  <rect x="75" y="358" width="210" height="68" rx="7" fill="#ffe0b2" stroke="#e6851f" stroke-width="1.5"/>
  <text x="180" y="378" text-anchor="middle" font-size="12" font-weight="bold" fill="#7a3d00">① ECR build &amp; push</text>
  <text x="180" y="395" text-anchor="middle" font-size="11" fill="#555">docker build amazia-core</text>
  <text x="180" y="410" text-anchor="middle" font-size="11" fill="#555">docker build amazia-console</text>
  <text x="180" y="425" text-anchor="middle" font-size="11" fill="#888">→ ECR push</text>

  <!-- Step 2: npm build -->
  <rect x="315" y="358" width="210" height="68" rx="7" fill="#ffe0b2" stroke="#e6851f" stroke-width="1.5"/>
  <text x="420" y="378" text-anchor="middle" font-size="12" font-weight="bold" fill="#7a3d00">② フロントビルド</text>
  <text x="420" y="395" text-anchor="middle" font-size="11" fill="#555">amazia-market npm build</text>
  <text x="420" y="410" text-anchor="middle" font-size="11" fill="#555">console Vue npm build</text>
  <text x="420" y="425" text-anchor="middle" font-size="11" fill="#888">→ dist 生成</text>

  <!-- Step 3: S3 upload -->
  <rect x="555" y="358" width="210" height="68" rx="7" fill="#ffe0b2" stroke="#e6851f" stroke-width="1.5"/>
  <text x="660" y="378" text-anchor="middle" font-size="12" font-weight="bold" fill="#7a3d00">③ S3 upload</text>
  <text x="660" y="395" text-anchor="middle" font-size="11" fill="#555">zip -r amazia.zip .</text>
  <text x="660" y="410" text-anchor="middle" font-size="11" fill="#555">(vendor/node_modules除外)</text>
  <text x="660" y="425" text-anchor="middle" font-size="11" fill="#888">→ s3://fullstack-renaissance-demo/</text>

  <!-- 矢印 ①②③ → SSM ① -->
  <line x1="180" y1="426" x2="180" y2="450" stroke="#d6b656" stroke-width="1.5" marker-end="url(#arrow-gold)"/>
  <line x1="420" y1="426" x2="420" y2="450" stroke="#d6b656" stroke-width="1.5" marker-end="url(#arrow-gold)"/>
  <line x1="660" y1="426" x2="660" y2="450" stroke="#d6b656" stroke-width="1.5" marker-end="url(#arrow-gold)"/>
  <!-- 横線でまとめる -->
  <line x1="180" y1="450" x2="660" y2="450" stroke="#d6b656" stroke-width="1.5"/>
  <line x1="420" y1="450" x2="420" y2="460" stroke="#d6b656" stroke-width="1.5" marker-end="url(#arrow-gold)"/>

  <!-- SSM ① -->
  <rect x="220" y="462" width="460" height="58" rx="7" fill="#fce4d6" stroke="#c44000" stroke-width="1.5"/>
  <text x="450" y="481" text-anchor="middle" font-size="12" font-weight="bold" fill="#7a1f00">④ SSM send-command ①（ポーリング待機）</text>
  <text x="450" y="497" text-anchor="middle" font-size="11" fill="#555">ECR login → docker pull → S3 unzip → docker-compose down → docker-compose up -d</text>
  <text x="450" y="512" text-anchor="middle" font-size="11" fill="#888">完了まで最大6分 (15sec × 24回) ポーリング</text>

  <!-- SSM ① → SSM ② -->
  <line x1="450" y1="520" x2="450" y2="534" stroke="#c44000" stroke-width="1.5" marker-end="url(#arrow-red)"/>

  <!-- SSM ② -->
  <rect x="220" y="536" width="460" height="46" rx="7" fill="#fce4d6" stroke="#c44000" stroke-width="1.5"/>
  <text x="450" y="554" text-anchor="middle" font-size="12" font-weight="bold" fill="#7a1f00">⑤ SSM send-command ②（ポーリング待機）</text>
  <text x="450" y="570" text-anchor="middle" font-size="11" fill="#555">nginx.conf コピー → dist コピー → nginx -t → systemctl reload nginx</text>

  <!-- ========================================
       3. AWS インフラ層
  ======================================== -->

  <!-- ECR -->
  <rect x="30" y="650" width="200" height="80" rx="10" fill="#fff3e0" stroke="#FF9900" stroke-width="2"/>
  <text x="130" y="675" text-anchor="middle" font-size="13" font-weight="bold" fill="#7a4500">Amazon ECR</text>
  <text x="130" y="693" text-anchor="middle" font-size="11" fill="#555">amazia-core:latest</text>
  <text x="130" y="709" text-anchor="middle" font-size="11" fill="#555">amazia-console:latest</text>

  <!-- S3 -->
  <rect x="265" y="650" width="200" height="80" rx="10" fill="#fff3e0" stroke="#FF9900" stroke-width="2"/>
  <text x="365" y="675" text-anchor="middle" font-size="13" font-weight="bold" fill="#7a4500">Amazon S3</text>
  <text x="365" y="693" text-anchor="middle" font-size="11" fill="#555">fullstack-renaissance-demo</text>
  <text x="365" y="709" text-anchor="middle" font-size="11" fill="#555">amazia.zip</text>

  <!-- EC2 外枠 -->
  <rect x="500" y="635" width="370" height="290" rx="12" fill="#fffde7" stroke="#d6b656" stroke-width="2"/>
  <text x="685" y="658" text-anchor="middle" font-size="13" font-weight="bold" fill="#8a6a00">AWS EC2  13.54.203.95（Elastic IP）</text>
  <text x="685" y="673" text-anchor="middle" font-size="11" fill="#888">ap-southeast-2 / SSM管理（SSH不要）</text>

  <!-- Nginx -->
  <rect x="515" y="680" width="340" height="44" rx="7" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
  <text x="685" y="699" text-anchor="middle" font-size="12" font-weight="bold" fill="#1b5e20">Nginx（リバースプロキシ）</text>
  <text x="685" y="715" text-anchor="middle" font-size="11" fill="#555">:80 → /var/www/amazia-market　　:8001 → /var/www/amazia-console</text>

  <!-- Docker Compose 枠 -->
  <rect x="515" y="735" width="340" height="170" rx="7" fill="#fce4d6" stroke="#b85450" stroke-width="1.5"/>
  <text x="685" y="754" text-anchor="middle" font-size="12" font-weight="bold" fill="#7a1f00">Docker Compose</text>

  <!-- amazia-core -->
  <rect x="525" y="762" width="150" height="60" rx="6" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5"/>
  <text x="600" y="781" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a3a6a">amazia-core</text>
  <text x="600" y="797" text-anchor="middle" font-size="11" fill="#555">Java / Spring Boot</text>
  <text x="600" y="812" text-anchor="middle" font-size="11" fill="#555">:8080</text>

  <!-- amazia-console -->
  <rect x="695" y="762" width="150" height="60" rx="6" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5"/>
  <text x="770" y="781" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a3a6a">amazia-console</text>
  <text x="770" y="797" text-anchor="middle" font-size="11" fill="#555">PHP / Laravel</text>
  <text x="770" y="812" text-anchor="middle" font-size="11" fill="#555">:8000</text>

  <!-- MySQL -->
  <rect x="610" y="838" width="150" height="50" rx="6" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="685" y="858" text-anchor="middle" font-size="12" font-weight="bold" fill="#1b5e20">MySQL</text>
  <text x="685" y="876" text-anchor="middle" font-size="11" fill="#555">:3306 (volume永続化)</text>

  <!-- console → core -->
  <line x1="695" y1="792" x2="675" y2="792" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- core → mysql -->
  <line x1="600" y1="822" x2="660" y2="836" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <!-- console → mysql -->
  <line x1="770" y1="822" x2="730" y2="836" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ========================================
       4. 接続矢印（Actions → ECR / S3 / EC2）
  ======================================== -->

  <!-- deploy → ECR (①) -->
  <path d="M 130 610 L 130 648" fill="none" stroke="#FF9900" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <text x="80" y="635" font-size="11" fill="#FF9900">docker push</text>

  <!-- deploy → S3 (③) -->
  <path d="M 365 610 L 365 648" fill="none" stroke="#FF9900" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <text x="290" y="635" font-size="11" fill="#FF9900">aws s3 cp</text>

  <!-- deploy → EC2 SSM -->
  <path d="M 620 610 L 655 633" fill="none" stroke="#c44000" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="600" y="627" font-size="11" fill="#c44000">SSM</text>

  <!-- ECR → Docker Compose (docker pull) -->
  <path d="M 230 690 L 520 762" fill="none" stroke="#6c8ebf" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-blue)"/>
  <text x="330" y="730" font-size="11" fill="#6c8ebf">docker pull</text>

  <!-- S3 → EC2 (unzip) -->
  <path d="M 465 690 L 535 735" fill="none" stroke="#6c8ebf" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-blue)"/>
  <text x="452" y="720" font-size="11" fill="#6c8ebf">unzip</text>

  <!-- ========================================
       5. ブラウザアクセス
  ======================================== -->
  <rect x="30" y="960" width="840" height="82" rx="10" fill="#f3e5f5" stroke="#9673a6" stroke-width="1.5"/>
  <text x="450" y="982" text-anchor="middle" font-size="13" font-weight="bold" fill="#4a148c">ブラウザアクセス（デプロイ完了後）</text>

  <text x="140" y="1006" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">http://13.54.203.95</text>
  <text x="140" y="1022" text-anchor="middle" font-size="11" fill="#555">Amazia Market（会員向け）</text>
  <text x="140" y="1036" text-anchor="middle" font-size="11" fill="#888">React / MUI → Nginx :80</text>

  <text x="400" y="1006" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">http://13.54.203.95:8001</text>
  <text x="400" y="1022" text-anchor="middle" font-size="11" fill="#555">Amazia Console UI（管理者向け）</text>
  <text x="400" y="1036" text-anchor="middle" font-size="11" fill="#888">Vue / Ant Design → Nginx :8001</text>

  <text x="690" y="1006" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">http://13.54.203.95:8080</text>
  <text x="690" y="1022" text-anchor="middle" font-size="11" fill="#555">Amazia Core API</text>
  <text x="690" y="1036" text-anchor="middle" font-size="11" fill="#888">Spring Boot（直接公開）</text>

  <!-- EC2 → ブラウザ矢印 -->
  <line x1="685" y1="925" x2="685" y2="958" stroke="#9673a6" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

  <!-- ========================================
       矢印マーカー定義
  ======================================== -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6c8ebf"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#82b366"/>
    </marker>
    <marker id="arrow-gold" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#d6b656"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#c44000"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#FF9900"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#9673a6"/>
    </marker>
  </defs>

</svg>
