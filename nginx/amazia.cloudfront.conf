# CloudFront 経由前提の nginx 設定（フェーズX-3 ステップ3 / 7 / 8 完了後に適用）
#
# 役割:
#   - default_server で想定外 Host を 444（接続切断）にして HTTPS バイパスを防止
#   - www.amazia-portfolio.dedyn.io（ビューワー Host）と
#     origin.amazia-portfolio.dedyn.io（CloudFront オリジンドメイン）を正規受付とする
#   - Console を /console/ 配下で配信（Vite/Vue Router の base 変更とセット）
#
# 適用タイミング:
#   - desec.io の DNS が CloudFront ドメインへ向き、CloudFront ディストリビューションが
#     動作確認済みになった段階で、deploy.yml から amazia.conf の代わりに本ファイルを配置する。
#
# Host ヘッダ:
#   - CloudFront のオリジンリクエストポリシーが「オールビューアー」のため、ビューワーが送った
#     Host ヘッダ（`www.amazia-portfolio.dedyn.io`）がそのままオリジンへ転送される。
#   - また、curl で `origin.amazia-portfolio.dedyn.io` から直接叩くケース（CloudFront を経由
#     しないオリジン疎通確認）も許容するため、両方の server_name を列挙する。
#
# ヘルスチェック:
#   - deploy.yml 側で /__health に Host ヘッダなしでアクセス可能（default_server で 444 を
#     返すため、ヘルスチェックは https 化後に CloudFront 経由 URL で行う運用へ移行）。

server {
    listen 80 default_server;
    server_name _;
    return 444;  # 想定外 Host は接続を切る（HTTPS バイパス防止）
}

server {
    listen 80;
    server_name www.amazia-portfolio.dedyn.io origin.amazia-portfolio.dedyn.io;

    # Market（既定: Vue 静的）
    root /var/www/amazia-market;
    index index.html;

    # ヘルスチェック専用パス（直 IP / Host なし curl 用）
    location = /__health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Market が叩く API（Core / Spring）
    location /api/ {
        proxy_pass http://127.0.0.1:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Console API（Laravel）
    location /console/api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Console SPA 配信（/console/ 配下）
    location /console/ {
        alias /var/www/amazia-console/;
        index index.html;
        try_files $uri $uri/ /console/index.html;
    }

    # Market SPA フォールバック
    location / {
        try_files $uri $uri/ /index.html;
    }
}
