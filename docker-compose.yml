services:
  mysql:
    image: mysql:8.0
    container_name: amazia-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: amazia
      MYSQL_USER: amazia
      MYSQL_PASSWORD: amazia_pass
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  amazia-core:
    image: 741011674945.dkr.ecr.ap-southeast-2.amazonaws.com/amazia-core:latest
    container_name: amazia-core
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}
    depends_on:
      mysql:
        condition: service_healthy

  amazia-console:
    image: 741011674945.dkr.ecr.ap-southeast-2.amazonaws.com/amazia-console:latest
    container_name: amazia-console
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      APP_ENV: production
      APP_KEY: ${APP_KEY:-base64:EKpjSK2pqqo9qyW10J/MCkO5b06NnVSXE618mLVN4cY=}
      APP_DEBUG: "false"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: amazia
      DB_USERNAME: amazia
      DB_PASSWORD: amazia_pass
      CORE_API_URL: http://amazia-core:8080/api/products
      CORE_BASE_URL: http://amazia-core:8080/api
    depends_on:
      - amazia-core

volumes:
  mysql_data:
