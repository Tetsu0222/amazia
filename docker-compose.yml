services:
  mysql:
    image: mysql:8.0
    container_name: amazia-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: amazia
      MYSQL_USER: amazia
      MYSQL_PASSWORD: amazia_pass
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  amazia-core:
    image: 741011674945.dkr.ecr.ap-southeast-2.amazonaws.com/amazia-core:latest
    container_name: amazia-core
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-900}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-1209600}
      AWS_SES_FROM_ADDRESS: ${AWS_SES_FROM_ADDRESS:-no-reply@amazia.example.com}
      PASSWORD_RESET_URL: ${PASSWORD_RESET_URL:-http://localhost:5173/password/reset/confirm}
      # フェーズX-3: HTTPS（CloudFront）化に伴う Refresh Token Cookie 設定
      # 平文 HTTP のままなら全て既定値（false / 空 / /api/auth/refresh）でよい
      REFRESH_COOKIE_SECURE: ${REFRESH_COOKIE_SECURE:-false}
      REFRESH_COOKIE_DOMAIN: ${REFRESH_COOKIE_DOMAIN:-}
      REFRESH_COOKIE_PATH: ${REFRESH_COOKIE_PATH:-/api/auth/refresh}
    volumes:
      # SKU 画像など Spring が /app/storage/ に保存するファイルを EBS 上に永続化。
      # 本番 EC2 では deploy.yml が /home/ssm-user/amazia-storage を実体として用意し、
      # /home/ssm-user/amazia/amazia-core/storage を symlink で同所へ向ける運用。
      # docker-compose.local.yml も同じ ./amazia-core/storage:/app/storage を使うため記述を揃えている。
      - ./amazia-core/storage:/app/storage
    depends_on:
      mysql:
        condition: service_healthy

  amazia-console:
    image: 741011674945.dkr.ecr.ap-southeast-2.amazonaws.com/amazia-console:latest
    container_name: amazia-console
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      APP_ENV: production
      APP_KEY: ${APP_KEY:-base64:EKpjSK2pqqo9qyW10J/MCkO5b06NnVSXE618mLVN4cY=}
      APP_DEBUG: "false"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: amazia
      DB_USERNAME: amazia
      DB_PASSWORD: amazia_pass
      CORE_API_URL: http://amazia-core:8080/api/products
      CORE_BASE_URL: http://amazia-core:8080/api
      JWT_SECRET: ${JWT_SECRET}
      # フェーズX-3: HTTPS（CloudFront）化に伴う Laravel セッション Cookie 設定
      # 平文 HTTP 運用なら未設定（false / 空）でよい
      SESSION_SECURE_COOKIE: ${SESSION_SECURE_COOKIE:-false}
      SESSION_DOMAIN: ${SESSION_DOMAIN:-}
    depends_on:
      mysql:
        condition: service_healthy
      amazia-core:
        condition: service_started

volumes:
  mysql_data:
