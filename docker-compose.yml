services:
  mysql:
    image: mysql:8.0
    container_name: amazia-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: amazia
      MYSQL_USER: amazia
      MYSQL_PASSWORD: amazia_pass
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  amazia-core:
    image: 741011674945.dkr.ecr.ap-southeast-2.amazonaws.com/amazia-core:latest
    container_name: amazia-core
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      # フェーズX-4: t3.micro 復帰のためのメモリ最適化（Spring Heap 制限）
      # JVM デフォルト（物理 25%）では t3.micro（1024MB）で OOM 寸前のため固定上限を与える
      JAVA_TOOL_OPTIONS: "-Xmx384m -Xss256k -XX:MaxMetaspaceSize=128m"
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-900}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-1209600}
      AWS_SES_FROM_ADDRESS: ${AWS_SES_FROM_ADDRESS:-no-reply@amazia.example.com}
      PASSWORD_RESET_URL: ${PASSWORD_RESET_URL:-http://localhost:5173/password/reset/confirm}
      # フェーズX-3: HTTPS（CloudFront）化に伴う Refresh Token Cookie 設定
      # 平文 HTTP のままなら全て既定値（false / 空 / /api/auth/refresh）でよい
      REFRESH_COOKIE_SECURE: ${REFRESH_COOKIE_SECURE:-false}
      REFRESH_COOKIE_DOMAIN: ${REFRESH_COOKIE_DOMAIN:-}
      REFRESH_COOKIE_PATH: ${REFRESH_COOKIE_PATH:-/api/auth/refresh}
      # フェーズ13: Market 顧客セッション Cookie 設定
      # 平文 HTTP 運用なら全て既定値（false / 空 / 1800）でよい。CloudFront 経由では true / ドメイン指定。
      MARKET_COOKIE_SECURE: ${MARKET_COOKIE_SECURE:-false}
      MARKET_COOKIE_DOMAIN: ${MARKET_COOKIE_DOMAIN:-}
      MARKET_SESSION_TTL_SECONDS: ${MARKET_SESSION_TTL_SECONDS:-1800}
      # フェーズ13: Market 顧客アカウント運用（試行回数・ロック・最低年齢・パスワード）
      MARKET_MAX_FAILED_ATTEMPTS: ${MARKET_MAX_FAILED_ATTEMPTS:-5}
      MARKET_LOCK_MINUTES: ${MARKET_LOCK_MINUTES:-5}
      MARKET_MIN_AGE_YEARS: ${MARKET_MIN_AGE_YEARS:-18}
      MARKET_PASSWORD_HISTORY_SIZE: ${MARKET_PASSWORD_HISTORY_SIZE:-5}
      MARKET_PASSWORD_MIN_LENGTH: ${MARKET_PASSWORD_MIN_LENGTH:-8}
      # フェーズ13-5: 郵便局 KEN_ALL.CSV 取込 URL（フェーズ17 で月次バッチ化）
      POSTAL_CSV_URL: ${POSTAL_CSV_URL:-https://www.post.japanpost.jp/zipcode/dl/kogaki/zip/ken_all.zip}
      # フェーズ17: バッチ処理基盤（設計書 phase17_batch_processing.md r8 / 13.3 / §7）
      # 設計書 r3 で BATCH_ENABLED は scheduler / manual の alias に格下げされているため、
      # YAML 側で ${BATCH_SCHEDULER_ENABLED:${BATCH_ENABLED:true}} のフォールバックを構成する。
      # BATCH_DIGEST_ENABLED は意図的に独立（J-1）。
      BATCH_ENABLED: ${BATCH_ENABLED:-true}
      BATCH_SCHEDULER_ENABLED: ${BATCH_SCHEDULER_ENABLED:-true}
      BATCH_MANUAL_TRIGGER_ENABLED: ${BATCH_MANUAL_TRIGGER_ENABLED:-true}
      BATCH_DIGEST_ENABLED: ${BATCH_DIGEST_ENABLED:-true}
      # フォルトインジェクション（本番は false 固定。BatchProductionValidator が起動時に検査）
      SIMULATION_FAULT_INJECTION: ${SIMULATION_FAULT_INJECTION:-false}
      SIM_SALES_RATE: ${SIM_SALES_RATE:-0.05}
      SIM_INV_RATE: ${SIM_INV_RATE:-0.05}
      SIM_DELIVERY_RATE: ${SIM_DELIVERY_RATE:-0.10}
      # cron（JST）
      BATCH_DAILY_CRON: ${BATCH_DAILY_CRON:-0 30 3 * * *}
      BATCH_MONTHLY_POSTAL_CHECK_CRON: ${BATCH_MONTHLY_POSTAL_CHECK_CRON:-0 30 4 1 * *}
      BATCH_YEARLY_CRON: ${BATCH_YEARLY_CRON:-0 0 5 1 1 *}
      # 通知連携（任意。空文字なら Slack 連携を行わない）
      BATCH_NOTIFICATIONS_SLACK_WEBHOOK_URL: ${BATCH_NOTIFICATIONS_SLACK_WEBHOOK_URL:-}
      # 振込確認モード（disabled / mock-match / mock-mismatch-rate）。本番は disabled 固定
      BANK_TRANSFER_VERIFICATION_MODE: ${BANK_TRANSFER_VERIFICATION_MODE:-disabled}
      # 売上再計算の対象倉庫 ID（CSV / R-3）
      SALES_RECONCILIATION_WAREHOUSES: ${SALES_RECONCILIATION_WAREHOUSES:-1}
      # レートリミット（同 payload_hash 抑制 / R-10）
      BATCH_RATE_LIMIT_SUPPRESSION_MINUTES: ${BATCH_RATE_LIMIT_SUPPRESSION_MINUTES:-60}
      BATCH_RATE_LIMIT_DIGEST_ENABLED: ${BATCH_RATE_LIMIT_DIGEST_ENABLED:-true}
      # 自動購読対象ロール（G-2 / 13.0）
      BATCH_NOTIFICATIONS_AUTO_SUBSCRIBE_ROLES: ${BATCH_NOTIFICATIONS_AUTO_SUBSCRIBE_ROLES:-admin,senior_admin,eternal_advisor}
    volumes:
      # SKU 画像など Spring が /app/storage/ に保存するファイルを EBS 上に永続化。
      # 本番 EC2 では deploy.yml が /home/ssm-user/amazia-storage を実体として用意し、
      # /home/ssm-user/amazia/amazia-core/storage を symlink で同所へ向ける運用。
      # docker-compose.local.yml も同じ ./amazia-core/storage:/app/storage を使うため記述を揃えている。
      - ./amazia-core/storage:/app/storage
    depends_on:
      mysql:
        condition: service_healthy

  amazia-console:
    image: 741011674945.dkr.ecr.ap-southeast-2.amazonaws.com/amazia-console:latest
    container_name: amazia-console
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      APP_ENV: production
      APP_KEY: ${APP_KEY:-base64:EKpjSK2pqqo9qyW10J/MCkO5b06NnVSXE618mLVN4cY=}
      APP_DEBUG: "false"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: amazia
      DB_USERNAME: amazia
      DB_PASSWORD: amazia_pass
      CORE_API_URL: http://amazia-core:8080/api/products
      CORE_BASE_URL: http://amazia-core:8080/api
      JWT_SECRET: ${JWT_SECRET}
      # フェーズX-3: HTTPS（CloudFront）化に伴う Laravel セッション Cookie 設定
      # 平文 HTTP 運用なら未設定（false / 空）でよい
      SESSION_SECURE_COOKIE: ${SESSION_SECURE_COOKIE:-false}
      SESSION_DOMAIN: ${SESSION_DOMAIN:-}
    depends_on:
      mysql:
        condition: service_healthy
      amazia-core:
        condition: service_started

volumes:
  mysql_data:
