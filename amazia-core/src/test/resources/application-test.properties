spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

cors.allowed-origins=http://localhost:5173,http://localhost:3000

spring.sql.init.mode=always
# テスト環境は ddl-auto=create-drop で JPA がスキーマを生成するため、
# 本番(MySQL)向けの schema.sql は読み込まない（H2 と構文非互換のため）。
spring.sql.init.schema-locations=
spring.sql.init.data-locations=classpath:/test-data.sql
spring.jpa.defer-datasource-initialization=true

jwt.secret=test-secret-key-for-unit-tests-only-32chars!!
jwt.access-ttl=900
jwt.refresh-ttl=1209600

aws.ses.from-address=no-reply@amazia.example.com
password-reset.url=http://localhost:5173/password/reset/confirm

# Refresh Token Cookie 設定（フェーズX-3 / HTTPS 化のテスト用既定値）
refresh-cookie.secure=false
refresh-cookie.domain=
refresh-cookie.path=/api/auth/refresh

# Market 顧客セッション Cookie 設定（フェーズ13 / テスト用既定値）
market.cookie.secure=false
market.cookie.domain=
market.session.ttl-seconds=1800

# Market 顧客アカウント運用（フェーズ13 テスト用既定値）
market.account.max-failed-attempts=5
market.account.lock-minutes=5
market.account.min-age-years=18
market.account.password-history-size=5
market.account.password-min-length=8

# 郵便局 KEN_ALL.CSV 取込（フェーズ13-5 テスト用既定値 / 実 URL は叩かない）
postal.csv.url=http://localhost:0/ken_all.zip

