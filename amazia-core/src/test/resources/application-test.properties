spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

cors.allowed-origins=http://localhost:5173,http://localhost:3000

spring.sql.init.mode=always
# テスト環境は ddl-auto=create-drop で JPA がスキーマを生成するため、
# 本番(MySQL)向けの schema.sql は読み込まない（H2 と構文非互換のため）。
spring.sql.init.schema-locations=
spring.sql.init.data-locations=classpath:/test-data.sql
spring.jpa.defer-datasource-initialization=true

jwt.secret=test-secret-key-for-unit-tests-only-32chars!!
jwt.access-ttl=900
jwt.refresh-ttl=1209600

aws.ses.from-address=no-reply@amazia.example.com
password-reset.url=http://localhost:5173/password/reset/confirm

# Refresh Token Cookie 設定（フェーズX-3 / HTTPS 化のテスト用既定値）
refresh-cookie.secure=false
refresh-cookie.domain=
refresh-cookie.path=/api/auth/refresh

# Market 顧客セッション Cookie 設定（フェーズ13 / テスト用既定値）
market.cookie.secure=false
market.cookie.domain=
market.session.ttl-seconds=1800

# Market 顧客アカウント運用（フェーズ13 テスト用既定値）
market.account.max-failed-attempts=5
market.account.lock-minutes=5
market.account.min-age-years=18
market.account.password-history-size=5
market.account.password-min-length=8

# 郵便局 KEN_ALL.CSV 取込（フェーズ13-5 テスト用既定値 / 実 URL は叩かない）
postal.csv.url=http://localhost:0/ken_all.zip

# フェーズ14: 売上・購入機能 テスト用既定値（規約 4-1 / 設計書 r4）
amazia.sales.payment-methods.credit-card-id=1
amazia.sales.payment-methods.d-payment-id=2
amazia.sales.payment-methods.cash-on-delivery-id=3
amazia.sales.shipping-statuses.pending-id=1
amazia.sales.shipping-statuses.shipped-id=2
amazia.sales.shipping-statuses.delivered-id=3
amazia.sales.shipping-statuses.return-requested-id=4
amazia.sales.shipping-statuses.returned-id=5
amazia.sales.shipping-statuses.canceled-id=6
amazia.sales.shipping-statuses.delivery-failed-id=7
amazia.sales.shipping-statuses.rescheduled-id=8
amazia.sales.shipping-statuses.allowed-codes=PENDING,SHIPPED,DELIVERED,RETURN_REQUESTED,RETURNED
amazia.sales.sku-stock-tx-types.receive=receive
amazia.sales.sku-stock-tx-types.adjust=adjust
amazia.sales.sku-stock-tx-types.sale=sale
amazia.sales.sku-stock-tx-types.return=return
amazia.sales.sku-stock-tx-types.cancel=cancel
