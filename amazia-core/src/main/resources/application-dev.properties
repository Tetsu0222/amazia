cors.allowed-origins=http://localhost:5173,http://localhost:3000

spring.datasource.url=jdbc:mysql://mysql:3306/amazia?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Tokyo
spring.datasource.username=amazia
spring.datasource.password=amazia_pass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.sql.init.mode=always
spring.sql.init.continue-on-error=true
spring.jpa.defer-datasource-initialization=true

jwt.secret=${JWT_SECRET}
jwt.access-ttl=${JWT_ACCESS_TTL:900}
jwt.refresh-ttl=${JWT_REFRESH_TTL:1209600}

aws.ses.from-address=${AWS_SES_FROM_ADDRESS}
password-reset.url=${PASSWORD_RESET_URL}

# Refresh Token Cookie 設定（フェーズX-3 / HTTPS 化）
# CloudFront 経由（HTTPS）にする際は以下を環境変数で上書きする：
#   REFRESH_COOKIE_SECURE=true
#   REFRESH_COOKIE_DOMAIN=www.amazia-portfolio.dedyn.io
#   REFRESH_COOKIE_PATH=/console/api/auth/refresh
# 平文 HTTP 運用ではいずれも未設定（または false / 空 / /api/auth/refresh）。
refresh-cookie.secure=${REFRESH_COOKIE_SECURE:false}
refresh-cookie.domain=${REFRESH_COOKIE_DOMAIN:}
refresh-cookie.path=${REFRESH_COOKIE_PATH:/api/auth/refresh}
