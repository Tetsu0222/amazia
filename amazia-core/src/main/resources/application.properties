spring.application.name=amazia-core
spring.profiles.active=dev
spring.jpa.defer-datasource-initialization=true

# Refresh Token Cookie 既定値（フェーズX-3 / HTTPS 化）
# プロファイル別（dev / local / test）で上書き可能。
refresh-cookie.secure=${REFRESH_COOKIE_SECURE:false}
refresh-cookie.domain=${REFRESH_COOKIE_DOMAIN:}
refresh-cookie.path=${REFRESH_COOKIE_PATH:/api/auth/refresh}

# Market 顧客セッション Cookie 設定（フェーズ13 / 設計書 §3.2）
# 平文 HTTP 直 IP 運用なら全て既定値（false / 空 / 1800）でよい。
# CloudFront 経由（HTTPS）にする際は環境変数で上書きする：
#   MARKET_COOKIE_SECURE=true
#   MARKET_COOKIE_DOMAIN=www.amazia-portfolio.dedyn.io
market.cookie.secure=${MARKET_COOKIE_SECURE:false}
market.cookie.domain=${MARKET_COOKIE_DOMAIN:}
market.session.ttl-seconds=${MARKET_SESSION_TTL_SECONDS:1800}

# Market 顧客アカウント運用（フェーズ13 / 設計書 §3.4・§5.2）
# config 駆動規約（coding_guidelines §1-2）に従い、ログイン試行回数・ロック時間・最低年齢・
# パスワード履歴件数・パスワード最小長は config から参照する。
market.account.max-failed-attempts=${MARKET_MAX_FAILED_ATTEMPTS:5}
market.account.lock-minutes=${MARKET_LOCK_MINUTES:5}
market.account.min-age-years=${MARKET_MIN_AGE_YEARS:18}
market.account.password-history-size=${MARKET_PASSWORD_HISTORY_SIZE:5}
market.account.password-min-length=${MARKET_PASSWORD_MIN_LENGTH:8}

# 郵便局 KEN_ALL.CSV 取込（フェーズ13-5 / 設計書 §7.1）
# フェーズ17 で月次バッチに組み込むまでは --import-postal-csv フラグ起動でのみ使用する。
postal.csv.url=${POSTAL_CSV_URL:https://www.post.japanpost.jp/zipcode/dl/kogaki/zip/ken_all.zip}

# フェーズ14: 売上・購入機能（設計書 r4 / 規約 3-1 / 4-1）
# マスタ ID をテスト・Service 層からハードコードせず参照できるよう config 化。
# DB の初期 INSERT（V6 / V9） と整合させて運用する。
amazia.sales.payment-methods.credit-card-id=1
amazia.sales.payment-methods.d-payment-id=2
amazia.sales.payment-methods.cash-on-delivery-id=3
amazia.sales.shipping-statuses.pending-id=1
amazia.sales.shipping-statuses.shipped-id=2
amazia.sales.shipping-statuses.delivered-id=3
amazia.sales.shipping-statuses.return-requested-id=4
amazia.sales.shipping-statuses.returned-id=5
amazia.sales.shipping-statuses.canceled-id=6
amazia.sales.shipping-statuses.delivery-failed-id=7
amazia.sales.shipping-statuses.rescheduled-id=8

# フェーズ14 / phase15 の Service 層で許容する shipping_statuses の遷移先（マスタ存在 ≠ 入力許容 / Q14-4）。
# CANCELED / DELIVERY_FAILED / RESCHEDULED はマスタには存在するが本フェーズでは入力拒否する。
amazia.sales.shipping-statuses.allowed-codes=PENDING,SHIPPED,DELIVERED,RETURN_REQUESTED,RETURNED

# フェーズ14: SKU 在庫増減ログの type 値（既存 receive / adjust に r4 で sale / return / cancel を追加）
amazia.sales.sku-stock-tx-types.receive=receive
amazia.sales.sku-stock-tx-types.adjust=adjust
amazia.sales.sku-stock-tx-types.sale=sale
amazia.sales.sku-stock-tx-types.return=return
amazia.sales.sku-stock-tx-types.cancel=cancel

# フェーズ15: 配送管理（設計書 phase15_delivery_management.md r5 / 規約 4-1）
# shipping_methods マスタ ID（schema.sql の INSERT IGNORE と整合）
amazia.delivery.shipping-methods.home-delivery-id=1
amazia.delivery.shipping-methods.konbini-pickup-id=2
amazia.delivery.shipping-methods.dropoff-id=3
# 並行運用のダミー倉庫（warehouses マスタが1行のみの間は固定 / RRRR-5）
amazia.delivery.default-warehouse-id=1
# update_scheduled_date の reason プレフィックス（RRR-5）
amazia.delivery.scheduled-date-reasons.manual=[manual]
amazia.delivery.scheduled-date-reasons.inbound-recalc=[inbound_recalc]
amazia.delivery.scheduled-date-reasons.shipping-delay=[shipping_delay]
# 配送方法別リードタイム（日数）。都道府県別リードタイムは phaseX-5（マスタ化）で切り出し
amazia.delivery.lead-time-days.home-delivery=3
amazia.delivery.lead-time-days.konbini-pickup=4
amazia.delivery.lead-time-days.dropoff=2
# 出荷時の予約購入 SKU 在庫減算用 type 値（P5-3）
amazia.delivery.sku-stock-tx-types.sale-preorder-shipment=sale_preorder_shipment

# ============================================================================
# フェーズ17: バッチ処理基盤（設計書 phase17_batch_processing.md r8 / 13.3 / 規約 4-1 / 4-3）
# 設計書 r3 で BATCH_ENABLED は alias に格下げ。BATCH_DIGEST_ENABLED は独立（J-1）。
# ============================================================================
amazia.batch.scheduler-enabled=${BATCH_SCHEDULER_ENABLED:${BATCH_ENABLED:true}}
amazia.batch.manual-trigger-enabled=${BATCH_MANUAL_TRIGGER_ENABLED:${BATCH_ENABLED:true}}
amazia.batch.notifications.digest-enabled=${BATCH_DIGEST_ENABLED:true}
# DigestNotificationDispatchJob の起動間隔（ミリ秒。設計書 §6.4.2 / J-10／規約 4-1）
amazia.batch.notifications.digest-interval-ms=${BATCH_DIGEST_INTERVAL_MS:300000}
# フォルトインジェクション（本番は false 固定 / BatchProductionValidator が起動時検査）
amazia.simulation.fault-injection.enabled=${SIMULATION_FAULT_INJECTION:false}
amazia.simulation.fault-injection.sales-mismatch-rate=${SIM_SALES_RATE:0.05}
amazia.simulation.fault-injection.inventory-mismatch-rate=${SIM_INV_RATE:0.05}
amazia.simulation.fault-injection.delivery-trouble-rate=${SIM_DELIVERY_RATE:0.10}
# cron（JST / 設計書 §3）
amazia.batch.timezone=Asia/Tokyo
amazia.batch.daily.cron=${BATCH_DAILY_CRON:0 30 3 * * *}
amazia.batch.monthly.postal-import-cron=${BATCH_MONTHLY_POSTAL_IMPORT_CRON:0 0 3 1 * *}
amazia.batch.monthly.postal-check-cron=${BATCH_MONTHLY_POSTAL_CHECK_CRON:0 30 4 1 * *}
amazia.batch.yearly.cron=${BATCH_YEARLY_CRON:0 0 5 1 1 *}
# 通知連携（任意。空文字なら Slack 連携を行わない）
amazia.batch.notifications.slack-webhook-url=${BATCH_NOTIFICATIONS_SLACK_WEBHOOK_URL:}
# 振込確認モード（R-1 / disabled / mock-match / mock-mismatch-rate / 本番は disabled 固定）
amazia.batch.bank-transfer-verification.mode=${BANK_TRANSFER_VERIFICATION_MODE:disabled}
# 売上再計算の対象倉庫 ID CSV（R-3 / 既定 1。InventoryConsistencyCheckJob と共有）
amazia.batch.sales-reconciliation.target-warehouse-ids=${SALES_RECONCILIATION_WAREHOUSES:1}
# レートリミット（R-10 / 同 payload_hash 抑制）
amazia.batch.rate-limit.suppression-minutes=${BATCH_RATE_LIMIT_SUPPRESSION_MINUTES:60}
amazia.batch.rate-limit.digest-enabled=${BATCH_RATE_LIMIT_DIGEST_ENABLED:true}
# 自動購読対象ロール CSV（G-2 / 13.0）
amazia.batch.notifications.auto-subscribe-roles=${BATCH_NOTIFICATIONS_AUTO_SUBSCRIBE_ROLES:admin,senior_admin,eternal_advisor}
# 通知購読タグ一覧 CSV（設計書 6.2.3 / N-9・規約 1-2 / 4-1）
# 自動購読フックと将来のダイジェストが本値を単一情報源として参照する
amazia.batch.notifications.subscription-tags=${BATCH_NOTIFICATIONS_SUBSCRIPTION_TAGS:inventory_alerts,sales_alerts,delivery_alerts,postal_alerts,batch_failure}
# 郵便番号整合性チェック サンプルコード（Step 4-1 / 設計書 §3.2 ①）
# 詳細は config/batch/postal_sample_codes.yml も参照（ドキュメント用）
amazia.batch.postal-check.sample-codes=100-0001,530-0001,060-0001,810-0001,980-0001

# ============================================================================
# フェーズ18: 問い合わせ管理（設計書 phase18_inquiry_management.md r3 / 規約 1-2 / 3-1 / 4-1）
# Core は通知発火・所有者検証・件名/本文の上限・ページサイズ・テンプレート・operation_logs プレフィクス
# を config から取得する。
# ============================================================================
amazia.inquiry.statuses=NEW,IN_PROGRESS,DONE
# ステータス遷移ルール（設計書 r2：双方向許容 / config 駆動）
# 形式：旧:新1,新2;旧:新1,新2 ... の単一行 CSV（@Value で Map<String,List<String>> に解析）
amazia.inquiry.allowed-status-transitions=NEW:IN_PROGRESS,DONE;IN_PROGRESS:NEW,DONE;DONE:NEW,IN_PROGRESS
amazia.inquiry.target-types=delivery,product,sales
amazia.inquiry.subject-max-length=${INQUIRY_SUBJECT_MAX_LENGTH:100}
amazia.inquiry.message-max-length=${INQUIRY_MESSAGE_MAX_LENGTH:4000}
amazia.inquiry.page-size-console=${INQUIRY_LIST_PAGE_SIZE_CONSOLE:50}
amazia.inquiry.page-size-market=${INQUIRY_LIST_PAGE_SIZE_MARKET:20}
amazia.inquiry.notification-tag=inquiry_alerts
# 通知テンプレート（title / body / プレースホルダ：{inquiry_id} {subject} {user_name} {target_label} {old_status} {new_status}）
# 注意：Spring の @Value は `#{...}` を SpEL 式として解釈するため、リテラルの `#` は使用せず No. 表記で代替する。
amazia.inquiry.notification-templates.created.title=[問い合わせ] 新規 No.{inquiry_id} {subject}
amazia.inquiry.notification-templates.created.body={user_name} さんから新規問い合わせが登録されました。\n対象: {target_label}\n件名: {subject}
amazia.inquiry.notification-templates.replied.title=[問い合わせ] 返信 No.{inquiry_id}
amazia.inquiry.notification-templates.replied.body={user_name} さんが No.{inquiry_id} に返信しました。\n件名: {subject}
amazia.inquiry.notification-templates.status-changed.title=[問い合わせ] ステータス変更 No.{inquiry_id}
amazia.inquiry.notification-templates.status-changed.body=No.{inquiry_id} を {old_status} → {new_status} に変更しました。\n件名: {subject}
# target_label テンプレート
# 値は Unicode エスケープ（\uXXXX）で記述する。
# Spring Boot の application.properties は ISO-8859-1 読込み（PropertiesPropertySourceLoader）のため、
# 直書きの日本語は @Value バインド時点で文字化けする（API レスポンス targetLabel が化けた実績あり）。
amazia.inquiry.target-labels.delivery=\u914d\u9001 No.{target_id}
amazia.inquiry.target-labels.product=\u5546\u54c1 No.{target_id} ({product_name})
amazia.inquiry.target-labels.sales=\u6ce8\u6587 No.{target_id}
amazia.inquiry.target-labels.generic=\uff08\u6c4e\u7528\uff09
# operation_logs.comment プレフィックス
amazia.inquiry.operation-log-prefixes.admin-reply=[admin_reply]
amazia.inquiry.operation-log-prefixes.customer-reply=[customer_reply]
amazia.inquiry.operation-log-prefixes.status-change=[status_change]
amazia.inquiry.operation-log-prefixes.internal-note=[internal_note]

# ============================================================================
# フェーズ19: お知らせ機能（設計書 phase19_notice_management.md r2 / 規約 4-1）
# notice_categories マスタ ID は schema.sql の INSERT IGNORE と整合させる。
# ============================================================================
amazia.notice.categories.important-id=${NOTICE_CATEGORY_IMPORTANT_ID:1}
amazia.notice.categories.normal-id=${NOTICE_CATEGORY_NORMAL_ID:2}
# ヘッダー用未読取得の上限件数（GET /api/customer/notices/unread）
amazia.notice.header.max-items=${NOTICE_HEADER_MAX_ITEMS:10}
# 件名・本文の最大長（DB CHECK 相当 / バリデーションで二重防御）
amazia.notice.subject.max-length=${NOTICE_SUBJECT_MAX_LENGTH:255}
amazia.notice.body.max-length=${NOTICE_BODY_MAX_LENGTH:10000}
