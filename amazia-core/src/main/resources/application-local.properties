cors.allowed-origins=http://localhost:5173,http://localhost:5174,http://localhost:3000

spring.datasource.url=jdbc:mysql://localhost:3307/amazia?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Tokyo
spring.datasource.username=amazia
spring.datasource.password=amazia_pass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.sql.init.mode=always
spring.sql.init.continue-on-error=true
spring.jpa.defer-datasource-initialization=true

jwt.secret=${JWT_SECRET}
jwt.access-ttl=${JWT_ACCESS_TTL:900}
jwt.refresh-ttl=${JWT_REFRESH_TTL:1209600}

aws.ses.from-address=${AWS_SES_FROM_ADDRESS:no-reply@amazia.example.com}
password-reset.url=${PASSWORD_RESET_URL:http://localhost:5174/password/reset/confirm}

# Refresh Token Cookie 設定（フェーズX-3 / HTTPS 化）
refresh-cookie.secure=${REFRESH_COOKIE_SECURE:false}
refresh-cookie.domain=${REFRESH_COOKIE_DOMAIN:}
refresh-cookie.path=${REFRESH_COOKIE_PATH:/api/auth/refresh}

# Market 顧客セッション Cookie 設定（フェーズ13）
market.cookie.secure=${MARKET_COOKIE_SECURE:false}
market.cookie.domain=${MARKET_COOKIE_DOMAIN:}
market.session.ttl-seconds=${MARKET_SESSION_TTL_SECONDS:1800}

# 郵便局 KEN_ALL.CSV 取込（フェーズ13-5 / 設計書 §7.1）
postal.csv.url=${POSTAL_CSV_URL:https://www.post.japanpost.jp/zipcode/dl/kogaki/zip/ken_all.zip}
